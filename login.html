<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingresar | Mi Iglesia+</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Poppins,sans-serif;background:#fafafa;margin:0}
    .wrap{max-width:520px;margin:40px auto;background:#fff;padding:24px;border:1px solid #eee;border-radius:12px}
    input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
    button{width:100%;padding:12px;border:0;border-radius:8px;background:#FF6B5B;color:#fff;font-weight:700;cursor:pointer}
    .small{color:#666;font-size:.9rem}
    a{color:#FF6B5B}
    .btn-google{background:#fff;color:#1a1a1a;border:1px solid #ddd}
    .btn-secondary{background:#1a1a1a}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Ingresar</h1>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Contraseña" />
    <button id="btnLogin">Ingresar</button>
    <button id="btnGoogleLogin" class="btn-google" style="margin-top:10px">Ingresar con Google</button>
    <button id="btnReset" class="btn-secondary" style="margin-top:10px">Resetear contraseña</button>
    <p id="msg" class="small"></p>
    <p class="small" style="margin-top:12px">¿No tenés cuenta? <a href="registro.html">Registrar Iglesia</a></p>
  </div>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
