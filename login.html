<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingresar | Mi Iglesia+</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root{ --primary:#FF6B5B; --dark:#1a1a1a; --gray:#666; --border:#e0e0e0; }
    *{ box-sizing:border-box; margin:0; padding:0 }
    body{font-family:Poppins,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
    .logo{display:flex;align-items:center;gap:.5rem;justify-content:center;margin-bottom:1.5rem;text-decoration:none}
    .logo img{height:42px;border-radius:10px}
    .logo-text{font-size:1.3rem;font-weight:800;color:var(--dark)}
    .logo-text b{color:var(--primary)}
    h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.3rem}
    .sub{text-align:center;color:var(--gray);font-size:.88rem;margin-bottom:1.5rem}

    /* Tabs */
    .type-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:#f5f5f5;border-radius:10px;padding:.3rem}
    .type-tab{flex:1;padding:.5rem;border:0;border-radius:8px;font-family:Poppins;font-size:.85rem;font-weight:700;cursor:pointer;background:none;color:var(--gray);transition:all .2s}
    .type-tab.active{background:#fff;color:var(--dark);box-shadow:0 2px 8px rgba(0,0,0,.08)}

    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.82rem;font-weight:700;margin-bottom:.3rem}
    input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-family:Poppins;font-size:.92rem;transition:border-color .2s}
    input:focus{outline:none;border-color:var(--primary)}
    .btn{width:100%;padding:.85rem;border:0;border-radius:12px;font-family:Poppins;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.3rem}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-google{background:#fff;color:#333;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:.6rem}
    .btn-google:hover{background:#f9f9f9}
    .btn-dark{background:#111;color:#fff}
    .divider{display:flex;align-items:center;gap:.8rem;margin:1rem 0;color:#aaa;font-size:.82rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .forgot{text-align:right;font-size:.78rem;margin-top:.3rem}
    .forgot a{color:var(--gray);text-decoration:none}
    .forgot a:hover{color:var(--primary)}
    #msg{text-align:center;font-size:.85rem;min-height:1.2rem;margin-top:.8rem;font-weight:600;color:#444}
    .footer-link{text-align:center;margin-top:1rem;font-size:.85rem;color:var(--gray)}
    .footer-link a{color:var(--primary);font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <a class="logo" href="index.html">
      <img src="assets/logo.png" alt="Mi Iglesia+">
      <span class="logo-text">Mi <b>Iglesia+</b></span>
    </a>
    <h1>Bienvenido de vuelta</h1>
    <p class="sub">Ingresá a tu cuenta</p>

    <!-- Tabs: ambos clickeables -->
    <div class="type-tabs">
      <button class="type-tab" onclick="window.location.href='login-usuario.html'">👤 Usuario</button>
      <button class="type-tab active" onclick="window.location.href='login.html'">⛪ Iglesia</button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="tu@email.com" autocomplete="email"/>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input id="password" type="password" placeholder="Tu contraseña" autocomplete="current-password"/>
      <div class="forgot"><a href="#" id="btnReset">¿Olvidaste tu contraseña?</a></div>
    </div>

    <button class="btn btn-primary" id="btnLogin">Ingresar</button>

    <div class="divider">o</div>
    <button class="btn btn-google" id="btnGoogleLogin">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continuar con Google
    </button>

    <p id="msg"></p>
    <div class="footer-link">¿No tenés cuenta? <a href="registro.html">Registrar Iglesia</a></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import {
      getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup,
      sendEmailVerification, sendPasswordResetEmail
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBOj5yJQ2kcU4_xrUY1sDPB3XU3lWupX-A",
      authDomain: "miiglesia-plus.firebaseapp.com",
      projectId: "miiglesia-plus",
      storageBucket: "miiglesia-plus.firebasestorage.app",
      messagingSenderId: "407699856167",
      appId: "1:407699856167:web:5d421d407ab7c9789aa702",
      measurementId: "G-VEPJFQGCQB"
    };

    const ADMIN_EMAIL = "miiglesia.on@gmail.com";
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const $    = (id) => document.getElementById(id);
    const msg  = $('msg');

    async function login() {
      const email    = $('email').value.trim();
      const password = $('password').value.trim();
      try {
        msg.style.color = '#444'; msg.textContent = 'Ingresando...';
        const { user } = await signInWithEmailAndPassword(auth, email, password);

        if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
          window.location.href = 'admin.html'; return;
        }
        if (!user.emailVerified) {
          msg.innerHTML = '⚠️ Tu email no está verificado. <button id="resendBtn" style="background:none;border:1px solid #ddd;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:.82rem">Reenviar</button>';
          document.getElementById('resendBtn').onclick = async () => {
            await sendEmailVerification(user);
            msg.textContent = '✅ Verificación reenviada. Revisá tu correo.';
          };
          return;
        }
        const snap = await getDoc(doc(db, 'iglesias', user.uid));
        const data = snap.data();
        if (!snap.exists() || !data) { msg.style.color='#dc3545'; msg.textContent = 'No se encontró la iglesia asociada a tu cuenta.'; return; }
        if (['baneada','banneada'].includes(data.estado)) { msg.style.color='#dc3545'; msg.textContent = '❌ Tu iglesia está baneada. Contactá al soporte.'; return; }
        if (data.estado !== 'activa') { msg.style.color='#856404'; msg.textContent = '⏳ Tu iglesia está pendiente de aprobación.'; return; }
        window.location.href = 'dashboard.html';
      } catch(e) {
        const map = {
          'auth/user-not-found':     'No existe una cuenta con ese email.',
          'auth/wrong-password':     'Contraseña incorrecta.',
          'auth/invalid-credential': 'Email o contraseña incorrectos.',
          'auth/too-many-requests':  'Demasiados intentos. Probá más tarde.',
          'auth/user-disabled':      'La cuenta está deshabilitada.'
        };
        msg.style.color = '#dc3545';
        msg.textContent = '❌ ' + (map[e?.code] || e?.message || 'Error inesperado');
      }
    }

    async function loginWithGoogle() {
      const provider = new GoogleAuthProvider();
      try {
        const { user } = await signInWithPopup(auth, provider);
        if (user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
          window.location.href = 'admin.html'; return;
        }
        const snap = await getDoc(doc(db, 'iglesias', user.uid));
        if (!snap.exists()) { window.location.href = 'registro.html'; return; }
        const data = snap.data();
        if (['baneada','banneada'].includes(data.estado)) { msg.style.color='#dc3545'; msg.textContent = '❌ Iglesia baneada.'; return; }
        if (data.estado !== 'activa') { msg.style.color='#856404'; msg.textContent = '⏳ Iglesia pendiente de aprobación.'; return; }
        window.location.href = 'dashboard.html';
      } catch(e) {
        msg.style.color = '#dc3545';
        msg.textContent = '❌ ' + (e?.message || 'Error inesperado');
      }
    }

    $('btnLogin').addEventListener('click', login);
    $('btnGoogleLogin').addEventListener('click', loginWithGoogle);
    $('btnReset').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = $('email').value.trim();
      if (!email) { msg.style.color='#dc3545'; msg.textContent = 'Ingresá tu email primero.'; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        msg.style.color = '#16a34a';
        msg.textContent = '📬 Te enviamos un email para resetear la contraseña.';
      } catch(e) { msg.style.color='#dc3545'; msg.textContent = '❌ ' + e.message; }
    });

    $('password').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
