<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrar Iglesia | Mi Iglesia+</title>

  <!-- Tipografía -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    :root{ --primary:#FF6B5B; --dark:#1a1a1a; --gray:#666; --border:#e0e0e0; --white:#fff; }
    *{ box-sizing:border-box }
    body{font-family:Poppins,sans-serif;background:#fafafa;margin:0;color:var(--dark)}
    .wrap{max-width:520px;margin:40px auto;background:#fff;padding:24px;border:1px solid #eee;border-radius:12px}
    h1{margin:0 0 6px 0}
    .small{color:#666;font-size:.92rem;margin:0 0 18px 0}
    input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-family:Poppins}
    button{width:100%;padding:12px;border:0;border-radius:8px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    a{color:var(--primary);text-decoration:none}
    .section-title{margin-top:18px;font-weight:800}

    /* ===== Parche anti-overlay (solo para registro) ===== */
    .wrap { position: relative; z-index: 9999; }
    input, button, select, textarea { pointer-events: auto !important; }
    .overlay, .page-cover, .hero::after, .cta::after, nav::after { pointer-events: none !important; }
    #btnRegister{ position:relative; z-index:10000; cursor:pointer; }
    .page-guard { pointer-events: auto !important; }

    /* Mensajes */
    #msg{ margin-top:10px; color:#444; font-size:.92rem; min-height:1.2em; }
  </style>
</head>
<body class="page-guard">
  <div class="wrap">
    <h1>Registrar Iglesia</h1>
    <p class="small">Creá la cuenta del admin y registrá tu iglesia. Te pediremos verificar el email.</p>

    <h3 class="section-title">Cuenta del Admin</h3>
    <input id="email" type="email" placeholder="Email del admin" autocomplete="email" />
    <input id="password" type="password" placeholder="Contraseña (mín. 6)" autocomplete="new-password" />

    <h3 class="section-title">Datos de la Iglesia</h3>
    <input id="nombre" placeholder="Nombre de la iglesia" />
    <input id="ciudad" placeholder="Ciudad" />
    <input id="pastor" placeholder="Pastor / Líder" />
    <input id="telefono" placeholder="Teléfono" />

    <!-- type="button" para evitar submit nativo -->
    <button id="btnRegister" type="button">Crear cuenta y registrar iglesia</button>
    <p id="msg"></p>

    <p class="small" style="margin-top:12px">¿Ya tenés cuenta? <a href="login.html">Ingresar</a></p>
  </div>

  <!-- ===================== -->
  <!--  AUTH INLINE (FINAL)  -->
  <!-- ===================== -->
  <script type="module">
    /* Importar SDKs desde CDN (una sola versión) */
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      sendEmailVerification, signOut
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import {
      getFirestore, doc, setDoc, serverTimestamp, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    /* 🔵 Config */
    const firebaseConfig = {
      apiKey: "AIzaSyBOj5yJQ2kcU4_xrUY1sDPB3XU3lWupX-A",
      authDomain: "miiglesia-plus.firebaseapp.com",
      projectId: "miiglesia-plus",
      storageBucket: "miiglesia-plus.firebasestorage.app",
      messagingSenderId: "407699856167",
      appId: "1:407699856167:web:5d421d407ab7c9789aa702",
      measurementId: "G-VEPJFQGCQB"
    };

    /* Inicializar */
    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    console.info("Firebase OK. apiKey:", app.options?.apiKey);

    /* Utilidad */
    const $ = (id) => document.getElementById(id);

    async function ensurePaidOrRedirect(uid) {
      // Revisa preonboarding/{uid}.paid
      const pre = await getDoc(doc(db, 'preonboarding', uid));
      if (!pre.exists() || pre.data()?.paid !== true) {
        $('msg').innerHTML = '💳 Debés abonar el registro antes de crear la iglesia. pago-unico.htmlIr a pagar</a>';
        // Deja la sesión iniciada para que el pago funcione
        setTimeout(()=> location.href='pago-unico.html', 1200);
        return false;
      }
      return true;
    }

    async function createChurch(uid, payload) {
      await setDoc(doc(db, 'iglesias', uid), {
        id: uid,
        ...payload,
        adminUid: uid,
        miembros: 0,
        creadoEn: serverTimestamp(),
        estado: 'pendiente'
      }, { merge: true });
    }

    /* -------- Registro (con gate de pago previo) -------- */
    async function registerChurchAdmin(){
      const email    = $('email').value.trim();
      const password = $('password').value.trim();
      const nombre   = $('nombre').value.trim();
      const ciudad   = $('ciudad').value.trim();
      const pastor   = $('pastor').value.trim();
      const telefono = $('telefono').value.trim();
      const msg      = $('msg');

      if (!email || !password || !nombre || !ciudad){
        msg.textContent = 'Completá email, contraseña, nombre y ciudad.';
        return;
      }

      try {
        msg.textContent = 'Creando cuenta...';
        // 1) Intentar crear cuenta
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const uid  = cred.user.uid;

        // 2) Gate de pago previo
        msg.textContent = 'Verificando pago de registro...';
        const ok = await ensurePaidOrRedirect(uid);
        if (!ok) return; // sin pago, NO crear iglesia

        // 3) Crear iglesia
        msg.textContent = 'Creando iglesia...';
        await createChurch(uid, { nombre, ciudad, pastor: pastor || '', telefono: telefono || '', emailContacto: email });

        // 4) Verificación de email + salir
        await sendEmailVerification(cred.user);
        msg.textContent = '✅ Iglesia creada. Te enviamos un email de verificación. Revisá tu inbox/spam.';
        await signOut(auth);

      } catch (e) {
        // Si el email ya existe, intentamos iniciar sesión y repetir lógica de gate+crear
        if (e?.code === 'auth/email-already-in-use') {
          try {
            const cred2 = await signInWithEmailAndPassword(auth, email, password);
            const uid   = cred2.user.uid;

            $('msg').textContent = 'Verificando pago de registro...';
            const ok = await ensurePaidOrRedirect(uid);
            if (!ok) return;

            // Si ya existe doc iglesia, no volver a crear
            const igSnap = await getDoc(doc(db, 'iglesias', uid));
            if (!igSnap.exists()) {
              $('msg').textContent = 'Creando iglesia...';
              await createChurch(uid, { nombre, ciudad, pastor: pastor || '', telefono: telefono || '', emailContacto: email });
            }

            await sendEmailVerification(cred2.user);
            $('msg').textContent = '✅ Iglesia creada o actualizada. Verificá tu email.';
            await signOut(auth);
            return;
          } catch (e2) {
            showErr(e2);
            return;
          }
        }
        showErr(e);
      }
    }

    // Listeners (lo esencial en esta página)
    document.getElementById('btnRegister')
      ?.addEventListener('click', () => registerChurchAdmin().catch(showErr));

    function showErr(e){
      console.error(e);
      const msg = document.getElementById('msg');
      let txt = e?.message || 'Error inesperado';
      if (e?.code === 'auth/weak-password') txt = 'La contraseña es demasiado corta (mín. 6).';
      if (e?.code === 'auth/invalid-email') txt = 'Email inválido.';
      if (e?.code === 'auth/email-already-in-use') txt = 'Ese email ya está registrado. Si es tuyo, probá iniciar sesión.';
      msg.textContent = '❌ ' + txt;
    }
  </script>
</body>
</html>
