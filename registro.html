<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrar Iglesia | Mi Iglesia+</title>

  <!-- Tipografía -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{ --primary:#FF6B5B; --dark:#1a1a1a; --gray:#666; --border:#e0e0e0; --white:#fff; }
    body{font-family:Poppins,sans-serif;background:#fafafa;margin:0;color:var(--dark)}
    .wrap{max-width:520px;margin:40px auto;background:#fff;padding:24px;border:1px solid #eee;border-radius:12px}
    h1{margin:0 0 6px 0}
    .small{color:#666;font-size:.92rem;margin:0 0 18px 0}
    input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;font-family:Poppins}
    button{width:100%;padding:12px;border:0;border-radius:8px;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    a{color:var(--primary);text-decoration:none}
    .section-title{margin-top:18px;font-weight:800}

    /* ===== Parche anti-overlay (solo para registro) ===== */
    .wrap { position: relative; z-index: 5; } /* formulario por encima */
    input, button, select, textarea { pointer-events: auto !important; }
    /* Si hubiera capas globales/pseudo-elementos, que no bloqueen clics aquí */
    .overlay, .page-cover, .hero::after, .cta::after, nav::after { pointer-events: none !important; }
    /* Botón visible y clickeable */
    #btnRegister{ position:relative; z-index:10; cursor:pointer; }
    /* Por si alguna clase global deshabilitó eventos */
    .page-guard { pointer-events: auto !important; }

    /* Mensajes */
    #msg{ margin-top:10px; color:#444; font-size:.92rem; min-height:1.2em; }
  </style>
</head>
<body class="page-guard">
  <div class="wrap">
    <h1>Registrar Iglesia</h1>
    <p class="small">Creá la cuenta del admin y registrá tu iglesia. Te pediremos verificar el email.</p>

    <h3 class="section-title">Cuenta del Admin</h3>
    <input id="email" type="email" placeholder="Email del admin" autocomplete="email" />
    <input id="password" type="password" placeholder="Contraseña (mín. 6)" autocomplete="new-password" />

    <h3 class="section-title">Datos de la Iglesia</h3>
    <input id="nombre" placeholder="Nombre de la iglesia" />
    <input id="ciudad" placeholder="Ciudad" />
    <input id="pastor" placeholder="Pastor / Líder" />
    <input id="telefono" placeholder="Teléfono" />

    <!-- type="button" para evitar submit nativo -->
    <button id="btnRegister" type="button">Crear cuenta y registrar iglesia</button>
    <p id="msg"></p>

    <p class="small" style="margin-top:12px">¿Ya tenés cuenta? <a href="login.html">Ingresar</a></p>
  </div>

  <!-- ===================== -->
  <!--  AUTH INLINE (MVP)   -->
  <!-- ===================== -->
  <script type="module">
    /* Firebase core (usa tu firebase-init actual en /js/firebase-init.js) */
    import { app, auth, db } from '/js/firebase-init.js';
    import {
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup,
      sendEmailVerification,
      sendPasswordResetEmail,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import {
      doc, setDoc, serverTimestamp, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const $ = (id) => document.getElementById(id);

    async function registerChurchAdmin(){
      const email = $('email').value.trim();
      const password = $('password').value.trim();
      const nombre = $('nombre').value.trim();
      const ciudad = $('ciudad').value.trim();
      const pastor = $('pastor').value.trim();
      const telefono = $('telefono').value.trim();
      const msg = $('msg');

      if (!email || !password || !nombre || !ciudad){
        msg.textContent = 'Completá email, contraseña, nombre y ciudad.';
        return;
      }

      try {
        msg.textContent = 'Creando cuenta...';
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const churchId = cred.user.uid;

        await setDoc(doc(db, 'iglesias', churchId), {
          id: churchId,
          nombre,
          ciudad,
          pastor: pastor || '',
          telefono: telefono || '',
          adminUid: cred.user.uid,
          miembros: 0,
          emailContacto: email,
          creadoEn: serverTimestamp(),
          estado: 'pendiente'
        });

        await sendEmailVerification(cred.user);
        msg.textContent = '✅ Cuenta creada. Te enviamos un email de verificación. Revisá tu inbox/spam.';
        await signOut(auth);
      } catch (e) {
        showErr(e);
      }
    }

    async function login(){
      const email = $('email').value.trim();
      const password = $('password').value.trim();
      const msg = $('msg');

      try {
        msg.textContent = 'Ingresando...';
        const { user } = await signInWithEmailAndPassword(auth, email, password);

        if (!user.emailVerified){
          msg.innerHTML = '⚠️ Tu email no está verificado. <button id="resendBtn">Reenviar verificación</button>';
          document.getElementById('resendBtn').onclick = async () => {
            await sendEmailVerification(user);
            msg.textContent = '✅ Verificación reenviada. Revisá tu correo.';
          };
          return;
        }

        const snap = await getDoc(doc(db, 'iglesias', user.uid));
        const data = snap.data();
        if (!data){
          msg.textContent = 'No se encontró la iglesia asociada a tu cuenta.';
          return;
        }
        if (data.estado === 'baneada' || data.estado === 'banneada'){
          msg.textContent = '❌ Tu iglesia está baneada. Contactá al soporte.';
          return;
        }
        if (data.estado !== 'activa'){
          msg.textContent = '⏳ Tu iglesia está pendiente de aprobación. Te avisaremos por email.';
          return;
        }

        window.location.href = 'dashboard.html';
      } catch (e) {
        showErr(e);
      }
    }

    async function loginWithGoogle(isRegistrationFlow=false){
      const provider = new GoogleAuthProvider();
      const msg = $('msg');
      try {
        const { user } = await signInWithPopup(auth, provider);
        const uid = user.uid;

        if (isRegistrationFlow){
          const churchRef = doc(db, 'iglesias', uid);
          const snap = await getDoc(churchRef);
          if (!snap.exists()){
            await setDoc(churchRef, {
              id: uid,
              nombre: 'Mi nueva iglesia',
              ciudad: '',
              pastor: '',
              telefono: '',
              adminUid: uid,
              miembros: 0,
              emailContacto: user.email || '',
              creadoEn: serverTimestamp(),
              estado: 'pendiente'
            });
          }
          window.location.href = 'dashboard.html';
          return;
        }

        const churchRef = doc(db, 'iglesias', uid);
        const snap = await getDoc(churchRef);
        if (!snap.exists()){
          window.location.href = 'registro.html';
          return;
        }
        const data = snap.data();
        if (data.estado === 'baneada' || data.estado === 'banneada'){
          msg && (msg.textContent = '❌ Tu iglesia está baneada. Contactá al soporte.');
          return;
        }
        if (data.estado !== 'activa'){
          msg && (msg.textContent = '⏳ Tu iglesia está pendiente de aprobación.');
          return;
        }

        window.location.href = 'dashboard.html';
      } catch (e) {
        showErr(e);
      }
    }

    async function resetPassword(){
      const email = $('email').value.trim();
      const msg = $('msg');
      if (!email){ msg.textContent = 'Ingresá tu email para enviar el reseteo.'; return; }
      try{
        await sendPasswordResetEmail(auth, email);
        msg.textContent = '📬 Te enviamos un email para resetear la contraseña.';
      }catch(e){
        showErr(e);
      }
    }

    async function logout(){
      await signOut(auth);
      window.location.href = 'index.html';
    }

    // Listeners
    document.getElementById('btnRegister')?.addEventListener('click', () => registerChurchAdmin().catch(showErr));
    document.getElementById('btnLogin')?.addEventListener('click', () => login().catch(showErr));
    document.getElementById('btnLogout')?.addEventListener('click', () => logout().catch(showErr));
    document.getElementById('btnGoogle')?.addEventListener('click', () => loginWithGoogle(true).catch(showErr));
    document.getElementById('btnGoogleLogin')?.addEventListener('click', () => loginWithGoogle(false).catch(showErr));
    document.getElementById('btnReset')?.addEventListener('click', () => resetPassword().catch(showErr));

    function showErr(e){
      console.error(e);
      const msg = document.getElementById('msg');
      if (msg) msg.textContent = '❌ ' + (e?.message || 'Error inesperado');
    }

    // Export no es necesario en inline, pero lo dejamos por compatibilidad
    export { onAuthStateChanged };
  </script>
</body>
</html>
