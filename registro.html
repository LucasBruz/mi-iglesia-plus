<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrar Iglesia | Mi Iglesia+</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Poppins,sans-serif;background:#fafafa;margin:0}
    .wrap{max-width:520px;margin:40px auto;background:#fff;padding:24px;border:1px solid #eee;border-radius:12px}
    input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
    button{width:100%;padding:12px;border:0;border-radius:8px;background:#FF6B5B;color:#fff;font-weight:700;cursor:pointer}
    .small{color:#666;font-size:.9rem}
    a{color:#FF6B5B}
    .btn-google{background:#fff;color:#1a1a1a;border:1px solid #ddd}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Registrar Iglesia</h1>
    <p class="small">Creá la cuenta del admin y registrá tu iglesia. Te pediremos verificar el email.</p>
    <h3>Cuenta del Admin</h3>
    <input id="email" type="email" placeholder="Email del admin" />
    <input id="password" type="password" placeholder="Contraseña (mín. 6)" />
    <h3>Datos de la Iglesia</h3>
    <input id="nombre" placeholder="Nombre de la iglesia" />
    <input id="ciudad" placeholder="Ciudad" />
    <input id="pastor" placeholder="Pastor" />
    <input id="telefono" placeholder="Teléfono" />
    <button id="btnRegister">Crear cuenta y registrar iglesia</button>
    <button id="btnGoogle" class="btn-google" style="margin-top:10px">Continuar con Google</button>
    <p class="small" style="margin-top:12px">¿Ya tenés cuenta? <a href="login.html">Ingresar</a></p>
    <p id="msg" class="small"></p>
  </div>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
