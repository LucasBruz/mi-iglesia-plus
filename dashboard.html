<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard | Mi Iglesia+</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:Poppins,sans-serif;background:#fafafa;margin:0}
    .wrap{max-width:720px;margin:40px auto;background:#fff;padding:24px;border:1px solid #eee;border-radius:12px}
    input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px}
    button{padding:12px 14px;border:0;border-radius:8px;background:#FF6B5B;color:#fff;font-weight:700;cursor:pointer}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row button{flex:1}
    .small{color:#666;font-size:.9rem}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Panel de Iglesia</h1>
    <p class="small">Editá los datos de tu iglesia (requiere cuenta verificada y estado activo).</p>
    <input id="nombre" placeholder="Nombre" />
    <input id="ciudad" placeholder="Ciudad" />
    <input id="pastor" placeholder="Pastor" />
    <input id="telefono" placeholder="Teléfono" />
    <input id="miembros" type="number" placeholder="Miembros" />
    <div class="row">
      <button id="btnSave">Guardar cambios</button>
      <button id="btnLogout" style="background:#1a1a1a">Salir</button>
    </div>
    <p id="msg" class="small"></p>
  </div>
  <script type="module" src="./js/churches.js"></script>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
