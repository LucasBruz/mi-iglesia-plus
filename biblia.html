<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biblia | Mi Iglesia+</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{ --primary:#FF6B5B; --dark:#1a1a1a; --gray:#666; --border:#e0e0e0; --bg:#fafafa; }
    *{ box-sizing:border-box; margin:0; padding:0 }
    body{ font-family:Poppins,sans-serif; background:var(--bg); color:var(--dark); }

    /* NAV */
    nav{ background:#fff; border-bottom:1px solid var(--border); padding:1rem 2rem; position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:1rem; }
    .nav-logo{ font-weight:800; font-size:1.2rem; text-decoration:none; color:var(--dark); }
    .nav-logo span{ color:var(--primary); }
    nav a.back{ color:var(--gray); text-decoration:none; font-size:.9rem; }
    nav a.back:hover{ color:var(--primary); }

    /* LAYOUT */
    .layout{ display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 65px); }

    /* SIDEBAR */
    .sidebar{ background:#fff; border-right:1px solid var(--border); padding:1.5rem 1rem; overflow-y:auto; height:calc(100vh - 65px); position:sticky; top:65px; }
    .sidebar h3{ font-size:1rem; margin-bottom:1rem; color:var(--gray); text-transform:uppercase; letter-spacing:.05em; }
    select{ width:100%; padding:.7rem; border:1px solid var(--border); border-radius:8px; font-family:Poppins; font-size:.95rem; margin-bottom:1rem; cursor:pointer; }
    select:focus{ outline:none; border-color:var(--primary); }

    .cap-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(44px,1fr)); gap:6px; }
    .cap-btn{ padding:.5rem; border:1px solid var(--border); border-radius:8px; background:#fff; font-family:Poppins; font-size:.85rem; cursor:pointer; text-align:center; transition:all .2s; }
    .cap-btn:hover{ background:var(--primary); color:#fff; border-color:var(--primary); }
    .cap-btn.active{ background:var(--primary); color:#fff; border-color:var(--primary); }

    /* READER */
    .reader{ padding:2rem; max-width:800px; }
    .reader-header{ margin-bottom:1.5rem; }
    .reader-header h1{ font-size:1.8rem; font-weight:800; }
    .reader-header p{ color:var(--gray); font-size:.9rem; margin-top:.3rem; }

    .versiculos{ line-height:2; font-size:1.05rem; }
    .versiculo{ margin-bottom:.5rem; }
    .v-num{ color:var(--primary); font-weight:700; font-size:.8rem; vertical-align:super; margin-right:4px; }

    .loading{ color:var(--gray); font-size:1rem; padding:2rem 0; }
    .error-msg{ color:#dc3545; padding:1rem; background:#fdecea; border-radius:8px; }

    /* NAV capítulos */
    .cap-nav{ display:flex; gap:1rem; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); }
    .cap-nav button{ padding:.7rem 1.2rem; border:1px solid var(--border); border-radius:8px; background:#fff; font-family:Poppins; font-weight:600; cursor:pointer; transition:all .2s; }
    .cap-nav button:hover:not(:disabled){ background:var(--primary); color:#fff; border-color:var(--primary); }
    .cap-nav button:disabled{ opacity:.4; cursor:not-allowed; }

    @media(max-width:768px){
      .layout{ grid-template-columns:1fr; }
      .sidebar{ height:auto; position:static; border-right:none; border-bottom:1px solid var(--border); }
      .reader{ padding:1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">Mi <span>Iglesia+</span></a>
    <a class="back" href="index.html">← Volver al inicio</a>
  </nav>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>📖 Seleccioná</h3>

      <label style="font-size:.85rem;color:var(--gray);margin-bottom:4px;display:block">Versión</label>
      <select id="version">
        <option value="rv1960">Reina Valera 1960</option>
        <option value="rv1909">Reina Valera 1909</option>
        <option value="nvi">Nueva Versión Internacional</option>
      </select>

      <label style="font-size:.85rem;color:var(--gray);margin-bottom:4px;display:block">Libro</label>
      <select id="libro"></select>

      <label style="font-size:.85rem;color:var(--gray);margin-top:.5rem;margin-bottom:.5rem;display:block">Capítulo</label>
      <div id="capGrid" class="cap-grid"></div>
    </aside>

    <!-- READER -->
    <main class="reader">
      <div class="reader-header">
        <h1 id="titulo">Seleccioná un libro</h1>
        <p id="subtitulo">Elegí un libro y capítulo para comenzar a leer</p>
      </div>
      <div id="contenido" class="versiculos">
        <p class="loading">👈 Elegí un libro del menú lateral para comenzar</p>
      </div>
      <div class="cap-nav">
        <button id="btnAnterior" disabled>← Anterior</button>
        <button id="btnSiguiente" disabled>Siguiente →</button>
      </div>
    </main>
  </div>

  <script>
    // =====================
    // LIBROS DE LA BIBLIA
    // =====================
    const LIBROS = [
      { nombre:"Génesis",        caps:50,  id:"genesis" },
      { nombre:"Éxodo",          caps:40,  id:"exodus" },
      { nombre:"Levítico",       caps:27,  id:"leviticus" },
      { nombre:"Números",        caps:36,  id:"numbers" },
      { nombre:"Deuteronomio",   caps:34,  id:"deuteronomy" },
      { nombre:"Josué",          caps:24,  id:"joshua" },
      { nombre:"Jueces",         caps:21,  id:"judges" },
      { nombre:"Rut",            caps:4,   id:"ruth" },
      { nombre:"1 Samuel",       caps:31,  id:"1+samuel" },
      { nombre:"2 Samuel",       caps:24,  id:"2+samuel" },
      { nombre:"1 Reyes",        caps:22,  id:"1+kings" },
      { nombre:"2 Reyes",        caps:25,  id:"2+kings" },
      { nombre:"1 Crónicas",     caps:29,  id:"1+chronicles" },
      { nombre:"2 Crónicas",     caps:36,  id:"2+chronicles" },
      { nombre:"Esdras",         caps:10,  id:"ezra" },
      { nombre:"Nehemías",       caps:13,  id:"nehemiah" },
      { nombre:"Ester",          caps:10,  id:"esther" },
      { nombre:"Job",            caps:42,  id:"job" },
      { nombre:"Salmos",         caps:150, id:"psalms" },
      { nombre:"Proverbios",     caps:31,  id:"proverbs" },
      { nombre:"Eclesiastés",    caps:12,  id:"ecclesiastes" },
      { nombre:"Cantares",       caps:8,   id:"song+of+solomon" },
      { nombre:"Isaías",         caps:66,  id:"isaiah" },
      { nombre:"Jeremías",       caps:52,  id:"jeremiah" },
      { nombre:"Lamentaciones",  caps:5,   id:"lamentations" },
      { nombre:"Ezequiel",       caps:48,  id:"ezekiel" },
      { nombre:"Daniel",         caps:12,  id:"daniel" },
      { nombre:"Oseas",          caps:14,  id:"hosea" },
      { nombre:"Joel",           caps:3,   id:"joel" },
      { nombre:"Amós",           caps:9,   id:"amos" },
      { nombre:"Abdías",         caps:1,   id:"obadiah" },
      { nombre:"Jonás",          caps:4,   id:"jonah" },
      { nombre:"Miqueas",        caps:7,   id:"micah" },
      { nombre:"Nahúm",          caps:3,   id:"nahum" },
      { nombre:"Habacuc",        caps:3,   id:"habakkuk" },
      { nombre:"Sofonías",       caps:3,   id:"zephaniah" },
      { nombre:"Hageo",          caps:2,   id:"haggai" },
      { nombre:"Zacarías",       caps:14,  id:"zechariah" },
      { nombre:"Malaquías",      caps:4,   id:"malachi" },
      { nombre:"Mateo",          caps:28,  id:"matthew" },
      { nombre:"Marcos",         caps:16,  id:"mark" },
      { nombre:"Lucas",          caps:24,  id:"luke" },
      { nombre:"Juan",           caps:21,  id:"john" },
      { nombre:"Hechos",         caps:28,  id:"acts" },
      { nombre:"Romanos",        caps:16,  id:"romans" },
      { nombre:"1 Corintios",    caps:16,  id:"1+corinthians" },
      { nombre:"2 Corintios",    caps:13,  id:"2+corinthians" },
      { nombre:"Gálatas",        caps:6,   id:"galatians" },
      { nombre:"Efesios",        caps:6,   id:"ephesians" },
      { nombre:"Filipenses",     caps:4,   id:"philippians" },
      { nombre:"Colosenses",     caps:4,   id:"colossians" },
      { nombre:"1 Tesalonicenses",caps:5,  id:"1+thessalonians" },
      { nombre:"2 Tesalonicenses",caps:3,  id:"2+thessalonians" },
      { nombre:"1 Timoteo",      caps:6,   id:"1+timothy" },
      { nombre:"2 Timoteo",      caps:4,   id:"2+timothy" },
      { nombre:"Tito",           caps:3,   id:"titus" },
      { nombre:"Filemón",        caps:1,   id:"philemon" },
      { nombre:"Hebreos",        caps:13,  id:"hebrews" },
      { nombre:"Santiago",       caps:5,   id:"james" },
      { nombre:"1 Pedro",        caps:5,   id:"1+peter" },
      { nombre:"2 Pedro",        caps:3,   id:"2+peter" },
      { nombre:"1 Juan",         caps:5,   id:"1+john" },
      { nombre:"2 Juan",         caps:1,   id:"2+john" },
      { nombre:"3 Juan",         caps:1,   id:"3+john" },
      { nombre:"Judas",          caps:1,   id:"jude" },
      { nombre:"Apocalipsis",    caps:22,  id:"revelation" },
    ];

    let libroActual = null;
    let capActual   = 1;

    // Poblar selector de libros
    const selectLibro = document.getElementById('libro');
    LIBROS.forEach((l, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = l.nombre;
      selectLibro.appendChild(opt);
    });

    // Cambiar libro
    selectLibro.addEventListener('change', () => {
      libroActual = LIBROS[parseInt(selectLibro.value)];
      capActual = 1;
      renderCapGrid();
      cargarCapitulo();
    });

    // Cambiar versión
    document.getElementById('version').addEventListener('change', () => {
      if (libroActual) cargarCapitulo();
    });

    function renderCapGrid() {
      const grid = document.getElementById('capGrid');
      grid.innerHTML = '';
      for (let i = 1; i <= libroActual.caps; i++) {
        const btn = document.createElement('button');
        btn.className = 'cap-btn' + (i === capActual ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => { capActual = i; renderCapGrid(); cargarCapitulo(); };
        grid.appendChild(btn);
      }
    }

    async function cargarCapitulo() {
      if (!libroActual) return;

      const version  = document.getElementById('version').value;
      const contenido = document.getElementById('contenido');
      const titulo    = document.getElementById('titulo');
      const subtitulo = document.getElementById('subtitulo');

      titulo.textContent    = `${libroActual.nombre} ${capActual}`;
      subtitulo.textContent = `Versión: ${document.getElementById('version').options[document.getElementById('version').selectedIndex].text}`;
      contenido.innerHTML   = '<p class="loading">Cargando...</p>';

      // Actualizar botones anterior/siguiente
      document.getElementById('btnAnterior').disabled = capActual <= 1;
      document.getElementById('btnSiguiente').disabled = capActual >= libroActual.caps;

      // Scroll al top del reader
      document.querySelector('.reader').scrollTo({ top: 0, behavior: 'smooth' });
      window.scrollTo({ top: 0, behavior: 'smooth' });

      try {
        const url = `https://bible-api.com/${libroActual.id}+${capActual}?translation=${version}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('No se pudo cargar el capítulo');
        const data = await res.json();

        if (!data.verses || !data.verses.length) {
          contenido.innerHTML = '<p class="error-msg">No se encontraron versículos para este capítulo.</p>';
          return;
        }

        contenido.innerHTML = data.verses.map(v => `
          <div class="versiculo">
            <span class="v-num">${v.verse}</span>${v.text.trim()}
          </div>
        `).join('');

      } catch(e) {
        contenido.innerHTML = `<p class="error-msg">❌ Error al cargar: ${e.message}. Verificá tu conexión.</p>`;
      }
    }

    // Navegación anterior/siguiente
    document.getElementById('btnAnterior').onclick = () => {
      if (capActual > 1) { capActual--; renderCapGrid(); cargarCapitulo(); }
    };
    document.getElementById('btnSiguiente').onclick = () => {
      if (libroActual && capActual < libroActual.caps) { capActual++; renderCapGrid(); cargarCapitulo(); }
    };

    // Cargar Génesis 1 por defecto
    selectLibro.value = '0';
    libroActual = LIBROS[0];
    renderCapGrid();
    cargarCapitulo();
  </script>
</body>
</html>
