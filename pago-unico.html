<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pagar Registro | Mi Iglesia+</title>

  <!-- GOOGLE FONTS (forma correcta / limpia) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{ --bg:#f5f5f5; --card:#fff; --text:#1a1a1a; --muted:#666; --primary:#ff6b5b; --border:#eee; }
    body{
      margin:0; padding:0; font-family:Poppins, sans-serif; color:var(--text);
      background:var(--bg); min-height:100vh; display:flex; justify-content:center; align-items:center;
    }
    .card{
      width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
      border-radius:18px; padding:28px; text-align:center; box-shadow:0 4px 18px rgba(0,0,0,.06);
    }
    h1{ margin:0 0 8px; font-size:26px; font-weight:800; }
    p{ margin:0 0 16px; color:var(--muted); }
    .price{ font-size:30px; font-weight:800; color:var(--primary); margin:10px 0 16px; }
    .btn{
      width:100%; border:0; border-radius:12px; padding:14px; font-weight:700; color:#fff;
      background:var(--primary); cursor:pointer; transition:opacity .2s ease;
    }
    .btn:hover{ opacity:.9; }
    .divider{ margin:22px 0; color:#999; font-size:14px; }
    .bank-box{
      text-align:left; background:#fafafa; border:1px solid var(--border);
      border-radius:12px; padding:14px;
    }
    .bank-box b{ color:#333; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Pago de registro</h1>
    <p>Antes de registrar tu iglesia, debés abonar el pago único.</p>

    <div class="price">AR$ 50.000</div>

    <button id="btnPagar" class="btn">Pagar con Mercado Pago</button>

    <div class="divider">— o —</div>

    <div class="bank-box">
      <p><b>Transferencia Bancaria</b></p>
      <p><b>Alias:</b> miiglesia.plus</p>
      <p><b>CBU:</b> 1234567890123456789012</p>
      <p><b>Titular:</b> Mi Iglesia Plus</p>
      <small>Enviá el comprobante por WhatsApp o email para activar tu registro.</small>
    </div>
  </main>

  <!-- LÓGICA -->
  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const auth = getAuth();
    const btn  = document.getElementById("btnPagar");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        // Si no hay sesión, redirigí a login
        location.href = "login.html";
        return;
      }

      btn.onclick = async () => {
        try {
          const r = await fetch("https://us-central1-miiglesia-plus.cloudfunctions.net/mpCreatePreference", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uid: user.uid })
          });
          const d = await r.json();
          if (d.error) { alert(d.error); return; }

          const url = d.init_point || d.sandbox_init_point || d.url;
          if (!url) { alert("No se recibió URL de pago."); return; }
          window.location.href = url;
        } catch (e) {
          console.error(e);
          alert("No se pudo iniciar el pago. Intentalo nuevamente.");
        }
      };
    });
  </script>
</body>
</html>
