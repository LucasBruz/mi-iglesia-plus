<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pagar Registro | Mi Iglesia+</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0; padding:0;
      font-family:Poppins, sans-serif;
      background:#f5f5f5;
      display:flex; justify-content:center; align-items:center;
      min-height:100vh;
      color:#1a1a1a;
    }
    .card {
      width:100%;
      max-width:420px;
      background:white;
      padding:28px;
      border-radius:18px;
      box-shadow:0 4px 18px rgba(0,0,0,0.1);
      text-align:center;
    }
    h1 {
      margin:0 0 8px 0;
      font-size:26px;
      font-weight:800;
    }
    p {
      margin:0 0 20px 0;
      color:#666;
    }
    .price {
      font-size:30px;
      margin:10px 0;
      font-weight:800;
      color:#ff6b5b;
    }
    button {
      width:100%;
      background:#ff6b5b;
      border:0;
      color:white;
      font-size:16px;
      padding:14px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }
    button:hover { opacity:0.85; }

    .divider {
      margin:26px 0;
      text-align:center;
      font-size:14px;
      color:#999;
    }

    .bank-box {
      background:#fafafa;
      border:1px solid #eee;
      border-radius:12px;
      padding:15px;
      text-align:left;
      margin-bottom:20px;
    }
    .bank-box b { color:#333; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Pago de registro</h1>
    <p>Antes de registrar tu iglesia, debés abonar el pago único.</p>

    <div class="price">AR$ 50.000</div>

    <button id="btnPagar">Pagar con Mercado Pago</button>

    <div class="divider">— o —</div>

    <div class="bank-box">
      <p><b>Transferencia Bancaria:</b></p>
      <p><b>Alias:</b> miiglesia.plus</p>
      <p><b>CBU:</b> 1234567890123456789012</p>
      <p><b>Titular:</b> Mi Iglesia Plus</p>
      <small>Enviá el comprobante por WhatsApp o email para activar tu registro.</small>
    </div>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { getAuth, onAuthStateChanged } from
    "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const auth = getAuth();
    const btn = document.getElementById("btnPagar");

    onAuthStateChanged(auth, (user) => {
      if (!user) return location.href = "login.html";

      btn.onclick = async () => {
        const r = await fetch(
          "https://us-central1-miiglesia-plus.cloudfunctions.net/mpCreatePreference",
          {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({ uid:user.uid })
          }
        );
        const d = await r.json();
        if (d.error) return alert(d.error);

        const url = d.init_point || d.sandbox_init_point || d.url;
        if (!url) return alert("No se recibió URL de pago.");
        window.location.href = url;
      };
    });
  </script>
</body>
</html>
