<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Iniciar sesión | Mi Iglesia+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B5B;--dark:#1a1a1a;--border:#e0e0e0;--gray:#666}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Poppins,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
    .card{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.08)}
    .logo{display:flex;align-items:center;gap:.5rem;justify-content:center;margin-bottom:1.5rem;text-decoration:none}
    .logo img{height:42px;border-radius:10px}
    .logo span{font-size:1.3rem;font-weight:800;color:var(--dark)}
    .logo span b{color:var(--primary)}
    h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.3rem}
    .sub{text-align:center;color:var(--gray);font-size:.88rem;margin-bottom:1.5rem}
    .form-group{margin-bottom:1rem}
    label{display:block;font-size:.82rem;font-weight:700;margin-bottom:.3rem}
    input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-family:Poppins;font-size:.92rem;transition:border-color .2s}
    input:focus{outline:none;border-color:var(--primary)}
    .btn{width:100%;padding:.85rem;border:0;border-radius:12px;font-family:Poppins;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:.3rem}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{opacity:.9}
    .btn-google{background:#fff;color:#333;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:.6rem}
    .btn-google:hover{background:#f9f9f9}
    .divider{display:flex;align-items:center;gap:.8rem;margin:1rem 0;color:#aaa;font-size:.82rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    .msg{text-align:center;font-size:.85rem;min-height:1.2rem;margin-top:.8rem;font-weight:600}
    .footer-link{text-align:center;margin-top:1rem;font-size:.85rem;color:var(--gray)}
    .footer-link a{color:var(--primary);font-weight:700;text-decoration:none}
    .forgot{text-align:right;font-size:.78rem;margin-top:.3rem}
    .forgot a{color:var(--gray);text-decoration:none}
    .forgot a:hover{color:var(--primary)}
    /* Tabs usuario / iglesia */
    .type-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:#f5f5f5;border-radius:10px;padding:.3rem}
    .type-tab{flex:1;padding:.5rem;border:0;border-radius:8px;font-family:Poppins;font-size:.85rem;font-weight:700;cursor:pointer;background:none;color:var(--gray);transition:all .2s}
    .type-tab.active{background:#fff;color:var(--dark);box-shadow:0 2px 8px rgba(0,0,0,.08)}
  </style>
</head>
<body>
  <div class="card">
    <a class="logo" href="index.html">
      <img src="assets/logo.png" alt="Mi Iglesia+">
      <span>Mi <b>Iglesia+</b></span>
    </a>
    <h1>Bienvenido de vuelta</h1>
    <p class="sub">Ingresá a tu cuenta</p>

    <!-- Tabs -->
    <div class="type-tabs">
      <button class="type-tab active" id="tabUsuario" onclick="setTipo('usuario')">👤 Usuario</button>
      <button class="type-tab" id="tabIglesia" onclick="setTipo('iglesia')">⛪ Iglesia</button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input id="login_email" type="email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input id="login_pass" type="password" placeholder="Tu contraseña">
      <div class="forgot"><a href="#" id="btnForgot">¿Olvidaste tu contraseña?</a></div>
    </div>
    <button class="btn btn-primary" id="btnLogin">Ingresar</button>

    <div class="divider" id="googleDivider">o</div>
    <button class="btn btn-google" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continuar con Google
    </button>

    <div id="loginMsg" class="msg"></div>
    <div class="footer-link" id="linkRegistro">¿No tenés cuenta? <a href="registro-usuario.html">Registrate gratis</a></div>
    <div class="footer-link" id="linkIglesia" style="display:none">¿Registraste tu iglesia? <a href="registro.html">Registrar iglesia</a></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBOj5yJQ2kcU4_xrUY1sDPB3XU3lWupX-A",
      authDomain: "miiglesia-plus.firebaseapp.com",
      projectId: "miiglesia-plus",
      storageBucket: "miiglesia-plus.firebasestorage.app",
      messagingSenderId: "407699856167",
      appId: "1:407699856167:web:5d421d407ab7c9789aa702"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let tipoActivo = 'usuario';

    window.setTipo = function(tipo) {
      tipoActivo = tipo;
      document.getElementById('tabUsuario').classList.toggle('active', tipo === 'usuario');
      document.getElementById('tabIglesia').classList.toggle('active', tipo === 'iglesia');
      document.getElementById('googleDivider').style.display  = tipo === 'usuario' ? 'flex' : 'none';
      document.getElementById('btnGoogle').style.display      = tipo === 'usuario' ? 'flex' : 'none';
      document.getElementById('linkRegistro').style.display   = tipo === 'usuario' ? 'block' : 'none';
      document.getElementById('linkIglesia').style.display    = tipo === 'iglesia' ? 'block' : 'none';
    };

    function mostrarError(texto) {
      const el = document.getElementById('loginMsg');
      el.style.color = '#dc3545';
      el.innerHTML = texto;
    }

    async function redirigirSegunTipo(uid) {
      // Verificar si es iglesia
      const igSnap = await getDoc(doc(db, 'iglesias', uid));
      if (igSnap.exists()) {
        window.location.href = 'dashboard.html';
        return;
      }
      // Si no es iglesia, es usuario normal
      window.location.href = 'perfil.html';
    }

    // ── Login email ──
    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('login_email').value.trim();
      const pass  = document.getElementById('login_pass').value;
      const btn   = document.getElementById('btnLogin');
      const msgEl = document.getElementById('loginMsg');
      if (!email || !pass) { mostrarError('Completá email y contraseña.'); return; }
      btn.disabled = true; btn.textContent = 'Ingresando...'; msgEl.textContent = '';
      try {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        await redirigirSegunTipo(cred.user.uid);
      } catch(e) {
        const msgs = {
          'auth/user-not-found':   'No existe una cuenta con ese email.',
          'auth/wrong-password':   'Contraseña incorrecta.',
          'auth/invalid-credential': 'Email o contraseña incorrectos.',
          'auth/too-many-requests': 'Demasiados intentos. Intentá más tarde.'
        };
        mostrarError(msgs[e.code] || e.message);
        btn.disabled = false; btn.textContent = 'Ingresar';
      }
    });

    // ── Login Google ──
    document.getElementById('btnGoogle').addEventListener('click', async () => {
      const btn   = document.getElementById('btnGoogle');
      const msgEl = document.getElementById('loginMsg');
      btn.disabled = true; msgEl.textContent = '';
      try {
        const result = await signInWithPopup(auth, provider);
        const user   = result.user;
        // Si es nuevo usuario de Google, crear su perfil
        const snap = await getDoc(doc(db, 'usuarios', user.uid));
        if (!snap.exists()) {
          await setDoc(doc(db, 'usuarios', user.uid), {
            nombre:    user.displayName || '',
            email:     user.email || '',
            fotoUrl:   user.photoURL || '',
            siguiendo: [],
            tipo:      'usuario',
            creadoEn:  serverTimestamp()
          });
        }
        await redirigirSegunTipo(user.uid);
      } catch(e) {
        mostrarError(e.code === 'auth/popup-closed-by-user' ? 'Ceraste el popup.' : e.message);
        btn.disabled = false;
      }
    });

    // ── Olvidé contraseña ──
    document.getElementById('btnForgot').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login_email').value.trim();
      const msgEl = document.getElementById('loginMsg');
      if (!email) { mostrarError('Ingresá tu email primero.'); return; }
      try {
        await sendPasswordResetEmail(auth, email);
        msgEl.style.color = '#16a34a';
        msgEl.textContent = '✅ Te enviamos un email para restablecer tu contraseña.';
      } catch(e) { mostrarError(e.message); }
    });

    // Enter para enviar
    document.getElementById('login_pass').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
  </script>
</body>
</html>
