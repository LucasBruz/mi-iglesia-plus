<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mi Iglesia+ | Cargando...</title>

  <!-- ── SEO BÁSICO (se actualiza por JS al cargar los datos) ── -->
  <meta name="description" content="Información, eventos, prédicas y más de esta iglesia en Mi Iglesia+.">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Mi Iglesia+">

  <!-- ── OPEN GRAPH ── -->
  <meta property="og:type" content="place">
  <meta property="og:site_name" content="Mi Iglesia+">
  <meta property="og:image" content="https://www.miiglesia.online/assets/og-image.png">
  <meta property="og:locale" content="es_AR">

  <!-- ── TWITTER CARD ── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.miiglesia.online/assets/og-image.png">

  <link rel="canonical" href="https://www.miiglesia.online/iglesia.html">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B5B">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <!-- Google Ads Tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18012009949"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18012009949');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B5B;--dark:#1a1a1a;--gray:#666;--border:#e0e0e0;--bg:#fafafa}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark)}

    /* NAV */
    nav{background:#fff;padding:.8rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--dark)}
    .nav-logo img{height:38px;width:38px;object-fit:contain}
    .nav-logo span{color:var(--primary)}
    .btn{display:inline-block;padding:.6rem 1.2rem;border-radius:8px;font-weight:700;font-family:'Poppins',sans-serif;text-decoration:none;border:0;cursor:pointer;font-size:.9rem;transition:all .2s}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(255,107,91,.3)}
    .btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}

    /* HERO IGLESIA */
    .church-hero{
      background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);
      padding:3rem 1.5rem 2rem;
      color:#fff;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .church-hero::before{
      content:'';position:absolute;inset:0;
      background-image:url('assets/fondo.png');
      background-size:cover;background-position:center center;
      z-index:0;
    }
    .church-hero::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.5) 100%);
      z-index:1;
    }
    .church-hero > *{position:relative;z-index:2}
    .church-logo{width:110px;height:110px;border-radius:20px;object-fit:contain;background:#fff;margin:0 auto 1.2rem;display:block;box-shadow:0 8px 32px rgba(0,0,0,0.4);padding:6px}
    .church-logo-placeholder{width:110px;height:110px;border-radius:20px;background:rgba(255,255,255,0.1);margin:0 auto 1.2rem;display:flex;align-items:center;justify-content:center;font-size:3rem;border:2px solid rgba(255,255,255,0.2)}
    .church-hero h1{font-size:2rem;font-weight:800;margin-bottom:.4rem}
    .church-hero .ciudad{color:rgba(255,255,255,0.7);font-size:1rem;margin-bottom:.8rem}
    .church-hero .pastor{color:rgba(255,255,255,0.55);font-size:.9rem;margin-bottom:1.5rem}
    .hero-badges{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
    .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .8rem;border-radius:999px;font-size:.8rem;font-weight:600;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.15)}
    .share-btn{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25);padding:.5rem 1rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.85rem;cursor:pointer;font-weight:600;transition:background .2s}
    .share-btn:hover{background:rgba(255,255,255,0.22)}

    /* SECCIONES */
    .container{max-width:900px;margin:0 auto;padding:0 1rem}
    .section{padding:2rem 1rem}
    .section-title{font-size:1.3rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
    .section-title::after{content:'';flex:1;height:2px;background:var(--border);margin-left:.5rem}

    /* INFO + MAPA */
    .info-mapa{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start}
    @media(max-width:640px){.info-mapa{grid-template-columns:1fr}}
    .info-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.2rem}
    .info-row{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem 0;border-bottom:1px solid #f5f5f5;font-size:.92rem}
    .info-row:last-child{border-bottom:0}
    .info-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
    .info-label{color:var(--gray);font-size:.8rem}
    .info-value{font-weight:600;color:var(--dark)}
    .map-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--border);height:220px;background:#f0f0f0;display:flex;align-items:center;justify-content:center}
    .map-wrap iframe{width:100%;height:100%;border:0;display:block}
    .map-placeholder{color:var(--gray);text-align:center;font-size:.9rem;padding:1rem}

    /* OFRENDAS */
    .ofrendas-box{background:linear-gradient(135deg,#fff8f7 0%,#fff 100%);border:2px solid rgba(255,107,91,0.2);border-radius:14px;padding:1.5rem;text-align:center}
    .ofrendas-box h3{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;color:var(--dark)}
    .ofrendas-box p{color:var(--gray);font-size:.9rem;margin-bottom:1rem;line-height:1.6}
    .ofrendas-metodos{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}
    .metodo-chip{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;font-size:.85rem;font-weight:600;color:var(--dark)}
    .ofrendas-detalle{background:#f9f9f9;border-radius:10px;padding:1rem;text-align:left;font-size:.88rem;line-height:1.8;color:var(--dark)}
    .ofrendas-detalle strong{color:var(--primary)}

    /* EVENTOS */
    .eventos-list{display:flex;flex-direction:column;gap:.8rem}
    .evento-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem}
    .evento-fecha{background:var(--primary);color:#fff;border-radius:10px;padding:.4rem .7rem;text-align:center;min-width:48px;flex-shrink:0}
    .evento-fecha .dia{font-size:1.3rem;font-weight:800;line-height:1}
    .evento-fecha .mes{font-size:.7rem;font-weight:600;text-transform:uppercase}
    .evento-info h4{font-size:.95rem;font-weight:700;margin-bottom:.2rem}
    .evento-info .lugar{color:var(--gray);font-size:.82rem;display:flex;align-items:center;gap:.3rem}
    .empty-state{text-align:center;color:var(--gray);padding:2rem;background:#fff;border:1px solid var(--border);border-radius:12px;font-size:.92rem}

    /* PRÉDICAS */
    .predicas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
    .predica-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .predica-card .yt-thumb{display:block}
    .yt-thumb:hover > div > div { transform:scale(1.1) }
    .predica-body{padding:.8rem}
    .predica-body h4{font-size:.92rem;font-weight:700;margin-bottom:.3rem}
    .predica-body .fecha{color:var(--gray);font-size:.8rem}

    /* FORMULARIOS PÚBLICOS */
    .form-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.5rem;display:flex;flex-direction:column;gap:.2rem}
    .form-icon{font-size:2rem;margin-bottom:.3rem}
    .form-title{font-size:1.1rem;font-weight:800;margin-bottom:.3rem}
    .form-desc{color:var(--gray);font-size:.85rem;line-height:1.5;margin-bottom:.8rem}
    .form-group{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.6rem}
    .form-label{font-size:.83rem;font-weight:700;color:var(--dark)}
    .opt{font-weight:400;color:#aaa;font-size:.78rem}
    .form-input{width:100%;padding:.65rem .9rem;border:1px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:.88rem;color:var(--dark);transition:border-color .2s;background:#fff}
    .form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,91,.1)}
    .form-btn{width:100%;padding:.75rem;border:0;border-radius:10px;background:var(--primary);color:#fff;font-weight:700;font-family:'Poppins',sans-serif;font-size:.92rem;cursor:pointer;transition:opacity .2s;margin-top:.4rem}
    .form-btn:hover{opacity:.88}
    .form-btn:disabled{opacity:.5;cursor:not-allowed}
    .form-feedback{font-size:.83rem;min-height:1.2rem;margin-top:.4rem;font-weight:600}
    @media(max-width:640px){.forms-grid{grid-template-columns:1fr!important}}

    /* FOOTER */
    .page-footer{background:var(--dark);color:rgba(255,255,255,.5);text-align:center;padding:1.5rem;font-size:.85rem}
    .page-footer a{color:var(--primary);text-decoration:none;font-weight:600}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;color:var(--gray)}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SHARE BAR */
    #share-bar{padding-bottom:env(safe-area-inset-bottom,0)}

    @media(max-width:600px){
      nav{padding:.7rem 1rem}
      nav a.btn{padding:.5rem .85rem;font-size:.8rem}
      .church-hero{padding:2rem 1rem 1.5rem}
      .church-logo{width:80px;height:80px;border-radius:14px}
      .church-logo-placeholder{width:80px;height:80px;font-size:2rem}
      .church-hero h1{font-size:1.35rem;margin-bottom:.3rem}
      .church-hero .ciudad{font-size:.88rem;margin-bottom:.5rem}
      .church-hero .pastor{font-size:.82rem;margin-bottom:1rem}
      .hero-badges{gap:.4rem;margin-bottom:1rem}
      .badge{font-size:.75rem;padding:.25rem .6rem}
      #btnNotif,.share-btn{padding:.55rem .9rem;font-size:.82rem}
      .section{padding:1.5rem .8rem}
      .section-title{font-size:1.1rem}
      .container{padding:0 .8rem}
      .info-mapa{grid-template-columns:1fr;gap:1rem}
      .map-wrap{height:180px}
      .predicas-grid{grid-template-columns:1fr;gap:.8rem}
      .ofrendas-box{padding:1rem}
      .ofrendas-metodos{gap:.5rem}
      .metodo-chip{font-size:.8rem;padding:.4rem .7rem}
      .evento-card{padding:.8rem 1rem;gap:.8rem}
      .evento-info h4{font-size:.88rem}
      .peticion-card{padding:.8rem 1rem}
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="assets/logo.png" alt="Mi Iglesia+">
      Mi <span>&nbsp;Iglesia+</span>
    </a>
    <a class="btn btn-primary" href="registro.html">Registrar mi iglesia</a>
  </nav>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Cargando iglesia…</span>
    </div>
  </div>

  <div class="page-footer" style="position:relative">
    <p>Powered by <a href="index.html">Mi Iglesia+</a> · Conectando comunidades de fe</p>
    <!-- Burbuja compartir dentro del footer, pegada a la derecha -->
    <button id="share-bubble" onclick="toggleSharePopup()" title="Compartir esta iglesia"
      style="position:absolute;right:1.2rem;top:50%;transform:translateY(-50%);width:40px;height:40px;background:#FF6B5B;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(255,107,91,.5);transition:transform .2s,box-shadow .2s">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 0 0 18 8a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 0 0 6 9a3 3 0 1 0 3 3c0-.24-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 0 0 18 16.08z" fill="#fff"/>
      </svg>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, setDoc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getMessaging, getToken, deleteToken } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBOj5yJQ2kcU4_xrUY1sDPB3XU3lWupX-A",
      authDomain: "miiglesia-plus.firebaseapp.com",
      projectId: "miiglesia-plus",
      storageBucket: "miiglesia-plus.firebasestorage.app",
      messagingSenderId: "407699856167",
      appId: "1:407699856167:web:5d421d407ab7c9789aa702"
    };
    const app       = initializeApp(firebaseConfig);
    const db        = getFirestore(app);
    const auth      = getAuth(app);
    const messaging = getMessaging(app);

    const VAPID_KEY  = 'BC3jOJ8lqkrHbiPrZ98XMeyRsmWbT4kqIjFWLIWRb2mSR8lKsIaDLNqmCnuvMFi2kpdUc59ugbKDv6bKQO2j8HE';
    const params     = new URLSearchParams(window.location.search);
    const iglesiaId  = params.get('id');
    let   usuarioUid = null;

    // ── SEGUIR IGLESIA ──
    onAuthStateChanged(auth, async (user) => {
      usuarioUid = user?.uid || null;
      if (user && iglesiaId) {
        try {
          const snap = await getDoc(doc(db, 'usuarios', user.uid));
          if (snap.exists()) {
            const siguiendo = snap.data().siguiendo || [];
            actualizarBtnSeguir(siguiendo.includes(iglesiaId));
          }
        } catch(_) {}
      }
    });

    function actualizarBtnSeguir(siguiendo) {
      const btn = document.getElementById('btnSeguir');
      if (!btn) return;
      if (siguiendo) {
        btn.textContent = '✅ Siguiendo';
        btn.style.background = 'rgba(255,255,255,0.25)';
      } else {
        btn.textContent = '⭐ Seguir';
        btn.style.background = 'rgba(255,255,255,0.15)';
      }
    }

    window.toggleSeguir = async function() {
      if (!usuarioUid) {
        window.location.href = `login-usuario.html`;
        return;
      }
      const btn = document.getElementById('btnSeguir');
      const siguiendo = btn.textContent.includes('Siguiendo');
      btn.disabled = true;
      try {
        if (siguiendo) {
          await updateDoc(doc(db,'usuarios',usuarioUid), { siguiendo: arrayRemove(iglesiaId) });
          actualizarBtnSeguir(false);
        } else {
          await updateDoc(doc(db,'usuarios',usuarioUid), { siguiendo: arrayUnion(iglesiaId) });
          actualizarBtnSeguir(true);
        }
      } catch(e) { alert('Error: ' + e.message); }
      btn.disabled = false;
    };

    function fmtFecha(d) {
      try {
        const fecha = d?.seconds ? new Date(d.seconds*1000) : new Date(d);
        return { dia: fecha.getDate(), mes: fecha.toLocaleString('es',{month:'short'}), full: fecha.toLocaleDateString('es') };
      } catch { return { dia:'?', mes:'?', full:'?' }; }
    }

    function escHtml(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function buildMapEmbed(direccion) {
      if (!direccion) return '';
      const q = encodeURIComponent(direccion);
      return `<iframe src="https://maps.google.com/maps?q=${q}&output=embed&z=15" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>`;
    }

    // ── NOTIFICACIONES ──
    const STORAGE_KEY = `notif_${iglesiaId}`;

    function estaSuscripto() {
      return localStorage.getItem(STORAGE_KEY) === '1';
    }

    async function toggleNotificaciones() {
      const btn = document.getElementById('btnNotif');
      if (!btn) return;
      btn.disabled = true;
      if (estaSuscripto()) {
        try {
          const token = localStorage.getItem(`token_${iglesiaId}`);
          if (token) {
            await deleteDoc(doc(db, 'suscriptores', iglesiaId, 'tokens', token));
            await deleteToken(messaging);
          }
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(`token_${iglesiaId}`);
          renderBtnNotif(false);
        } catch(e) { alert('Error al desuscribirse: ' + e.message); }
      } else {
        try {
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') { alert('Necesitás dar permiso de notificaciones en tu navegador.'); btn.disabled = false; return; }
          const token = await getToken(messaging, { vapidKey: VAPID_KEY });
          if (!token) throw new Error('No se pudo obtener el token');
          await setDoc(doc(db, 'suscriptores', iglesiaId, 'tokens', token), {
            token, creadoEn: new Date().toISOString(),
            plataforma: navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop'
          });
          localStorage.setItem(STORAGE_KEY, '1');
          localStorage.setItem(`token_${iglesiaId}`, token);
          renderBtnNotif(true);
          alert('✅ ¡Te suscribiste! Recibirás notificaciones de esta iglesia.');
        } catch(e) { alert('Error al suscribirse: ' + e.message); }
      }
      btn.disabled = false;
    }

    function renderBtnNotif(suscripto) {
      const btn = document.getElementById('btnNotif');
      if (!btn) return;
      if (suscripto) {
        btn.textContent = '🔕 Desactivar notificaciones';
        btn.style.background = 'rgba(255,255,255,0.1)';
        btn.style.border = '1px solid rgba(255,255,255,0.3)';
      } else {
        btn.textContent = '🔔 Recibir notificaciones';
        btn.style.background = 'var(--primary)';
        btn.style.border = 'none';
      }
    }

    window.toggleNotificaciones = toggleNotificaciones;

    async function render() {
      const app = document.getElementById('app');

      if (!iglesiaId) {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:#888"><h2>Iglesia no encontrada</h2><p>El enlace no contiene un ID válido.</p><a class="btn btn-primary" href="index.html" style="margin-top:1rem;display:inline-block">Volver al inicio</a></div>`;
        return;
      }

      let snap;
      try {
        snap = await getDoc(doc(db,'iglesias',iglesiaId));
      } catch(e) {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:#888"><h2>Error al cargar</h2><p style="color:#dc3545;font-size:.9rem">${e.message}</p><a class="btn btn-primary" href="index.html" style="margin-top:1rem;display:inline-block">Volver al inicio</a></div>`;
        return;
      }
      if (!snap.exists()) {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:#888"><h2>Iglesia no disponible</h2><p>Esta iglesia no existe o aún no está activa.</p><a class="btn btn-primary" href="index.html" style="margin-top:1rem;display:inline-block">Volver al inicio</a></div>`;
        return;
      }

      const ig = snap.data();
      const igNombre = ig.nombre || 'Iglesia';
      const igCiudad = ig.ciudad || '';
      const igProv   = ig.provincia || '';
      const igDesc   = ig.descripcion || `Iglesia ${igNombre} en ${igCiudad}. Encontrá horarios, eventos y más en Mi Iglesia+.`;
      const igUrl    = `https://www.miiglesia.online/iglesia.html?id=${iglesiaId}`;
      const igImagen = ig.logoUrl || 'https://www.miiglesia.online/assets/og-image.png';

      // SEO dinámico
      document.title = `${igNombre}${igCiudad ? ' — ' + igCiudad : ''} | Mi Iglesia+`;
      document.querySelector('meta[name="description"]').setAttribute('content', igDesc);
      document.querySelector('link[rel="canonical"]').setAttribute('href', igUrl);
      document.querySelector('meta[property="og:image"]').setAttribute('content', igImagen);

      // Guardar URL para la burbuja de compartir
      window._shareUrl = igUrl;

      // Schema.org
      const schema = document.createElement('script');
      schema.type = 'application/ld+json';
      schema.textContent = JSON.stringify({
        "@context": "https://schema.org", "@type": "Church",
        "name": igNombre, "description": igDesc, "url": igUrl,
        "address": { "@type": "PostalAddress", "streetAddress": ig.direccion||'', "addressLocality": igCiudad, "addressRegion": igProv, "addressCountry": "AR" },
        "image": igImagen,
        ...(ig.pastor ? { "member": { "@type": "Person", "name": ig.pastor } } : {})
      });
      document.head.appendChild(schema);

      const [evSnap, predSnap, galSnap] = await Promise.all([
        getDocs(collection(db,'iglesias',iglesiaId,'eventos')).catch(()=>({docs:[]})),

    function activarFormularios() {
      document.getElementById('btnEnviarPeticion')?.addEventListener('click', async () => {
        const nombre  = (document.getElementById('pet_nombre')?.value||'').trim();
        const apellido= (document.getElementById('pet_apellido')?.value||'').trim();
        const tel     = (document.getElementById('pet_tel')?.value||'').trim();
        const mensaje = (document.getElementById('pet_mensaje')?.value||'').trim();
        const msgEl   = document.getElementById('petMsg');
        const btn     = document.getElementById('btnEnviarPeticion');
        if (!nombre || !mensaje) { msgEl.textContent='❌ Completá tu nombre y tu petición.'; msgEl.style.color='#dc3545'; return; }
        btn.disabled=true; btn.textContent='Enviando…';
        try {
          const { addDoc, collection, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
          await addDoc(collection(db,'iglesias',iglesiaId,'peticiones'), { nombre, apellido, tel, mensaje, leida:false, creadoEn:serverTimestamp() });
          msgEl.textContent='✅ ¡Petición enviada! El equipo pastoral la recibirá con amor.'; msgEl.style.color='#16a34a';
          ['pet_nombre','pet_apellido','pet_tel','pet_mensaje'].forEach(id=>{ document.getElementById(id).value=''; });
          btn.textContent='🙏 Petición enviada';
        } catch(e) { msgEl.textContent='❌ Error: '+e.message; msgEl.style.color='#dc3545'; btn.disabled=false; btn.textContent='🙏 Enviar petición'; }
      });

      document.getElementById('btnEnviarBautismo')?.addEventListener('click', async () => {
        const nombre  = (document.getElementById('baut_nombre')?.value||'').trim();
        const apellido= (document.getElementById('baut_apellido')?.value||'').trim();
        const tel     = (document.getElementById('baut_tel')?.value||'').trim();
        const mensaje = (document.getElementById('baut_mensaje')?.value||'').trim();
        const msgEl   = document.getElementById('bautMsg');
        const btn     = document.getElementById('btnEnviarBautismo');
        if (!nombre) { msgEl.textContent='❌ Ingresá tu nombre.'; msgEl.style.color='#dc3545'; return; }
        btn.disabled=true; btn.textContent='Enviando…';
        try {
          const { addDoc, collection, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
          await addDoc(collection(db,'iglesias',iglesiaId,'bautismos'), { nombre, apellido, tel, mensaje, leido:false, creadoEn:serverTimestamp() });
          msgEl.textContent='✅ ¡Inscripción enviada! El equipo se pondrá en contacto con vos.'; msgEl.style.color='#1d4ed8';
          ['baut_nombre','baut_apellido','baut_tel','baut_mensaje'].forEach(id=>{ document.getElementById(id).value=''; });
          btn.textContent='💧 Inscripción enviada';
        } catch(e) { msgEl.textContent='❌ Error: '+e.message; msgEl.style.color='#dc3545'; btn.disabled=false; btn.textContent='💧 Inscribirme al bautismo'; }
      });
    }

    window.compartir = function() {
      const url = window.location.href;
      if (navigator.share) { navigator.share({ title: document.title, url }); }
      else { navigator.clipboard.writeText(url).then(()=> alert('¡Enlace copiado al portapapeles!')); }
    };

    window.abrirFoto = function(url) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      img.src = url; lb.style.display='flex'; document.body.style.overflow='hidden';
    };

    window.playVideo = function(el, ytId) {
      el.innerHTML = `<iframe width="100%" height="100%"
        src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0"
        allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        style="border:0;display:block;width:100%;height:100%"></iframe>`;
      el.style.cursor = 'default';
    };

    window.playChannelVideo = function(el, channelId) {
      el.innerHTML = `<iframe width="100%" height="100%"
        src="https://www.youtube.com/embed/live_stream?channel=${channelId}&autoplay=1&rel=0"
        allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        style="border:0;display:block;width:100%;height:100%"></iframe>`;
      el.style.cursor = 'default';
    };

    render().catch(e => {
      document.getElementById('app').innerHTML = `<div style="text-align:center;padding:4rem;color:#888"><h2>Error al cargar</h2><p>${e.message}</p></div>`;
    });
  </script>

  <!-- Lightbox -->
  <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;padding:1rem" onclick="this.style.display='none';document.body.style.overflow=''">
    <img id="lightboxImg" src="" alt="" style="max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)">
  </div>

  <!-- SW notificaciones -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(()=>{});
    }
  </script>

  <!-- ── BURBUJA COMPARTIR ── -->
  <style>
    #share-bubble:hover{
      transform:translateY(-50%) scale(1.12);
      box-shadow:0 4px 22px rgba(255,107,91,.75);
    }
    #share-popup{
      display:none;
      position:fixed;
      bottom:5rem; right:1.2rem;
      background:#fff;
      border-radius:14px;
      box-shadow:0 8px 32px rgba(0,0,0,.15);
      padding:.8rem;
      z-index:501;
      min-width:210px;
      border:1px solid #eee;
      animation:fadeUp .2s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    #share-popup .sp-title{font-size:.78rem;font-weight:700;color:#999;padding:.2rem .4rem .6rem;border-bottom:1px solid #f0f0f0;margin-bottom:.5rem}
    #share-popup a,#share-popup button{display:flex;align-items:center;gap:.6rem;width:100%;padding:.55rem .8rem;border-radius:8px;font-size:.88rem;font-weight:600;text-decoration:none;border:0;background:none;cursor:pointer;font-family:'Poppins',sans-serif;color:#1a1a1a;transition:background .15s}
    #share-popup a:hover,#share-popup button:hover{background:#f5f5f5}
    #share-popup .sp-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
  </style>

  <div id="share-popup">
    <div class="sp-title">📲 Compartir esta iglesia</div>
    <button onclick="shareNativoIglesia()">
      <span class="sp-icon" style="background:#FF6B5B">🔗</span> Compartir
    </button>
    <a id="shareWaLinkIglesia" href="" target="_blank" rel="noopener" onclick="cerrarSharePopup()">
      <span class="sp-icon" style="background:#25D366">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.478.655 4.8 1.8 6.807L2 30l7.38-1.773A13.93 13.93 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2z" fill="#fff"/><path d="M16 4.5c-6.351 0-11.5 5.149-11.5 11.5 0 2.14.588 4.143 1.613 5.858l.243.407-1.03 3.76 3.87-1.015.394.228A11.45 11.45 0 0 0 16 27.5c6.351 0 11.5-5.149 11.5-11.5S22.351 4.5 16 4.5z" fill="#25D366"/><path d="M21.003 18.77c-.307-.154-1.816-.896-2.097-.998-.281-.103-.486-.154-.69.154-.204.307-.791.998-.97 1.203-.178.204-.357.23-.664.077-.307-.154-1.295-.477-2.466-1.522-.911-.813-1.526-1.816-1.705-2.123-.178-.307-.019-.473.134-.626.137-.137.307-.358.46-.537.154-.178.205-.307.307-.511.103-.205.051-.384-.025-.537-.077-.154-.69-1.664-.945-2.277-.249-.597-.502-.516-.69-.526l-.588-.01c-.204 0-.537.077-.818.384-.281.307-1.073 1.049-1.073 2.558s1.099 2.967 1.252 3.171c.154.205 2.163 3.303 5.24 4.632.733.316 1.305.505 1.751.646.736.234 1.406.201 1.936.122.590-.088 1.816-.742 2.073-1.459.256-.716.256-1.33.179-1.459-.076-.128-.281-.205-.588-.358z" fill="#fff"/></svg>
      </span> WhatsApp
    </a>
    <button onclick="copiarLinkIglesia()">
      <span class="sp-icon" style="background:#f0f0f0">📋</span>
      <span id="shareCopyLabelIglesia">Copiar link</span>
    </button>
  </div>

  <script>
  (function(){
    let popupAbierto = false;

    // Setear link WhatsApp — se llama al abrir el popup, siempre con el valor más fresco
    function actualizarShareLinks() {
      const el = document.getElementById('shareWaLinkIglesia');
      if (!el) return;
      const url  = window._shareUrl || window.location.href;
      const text = '🙏 Visitá esta iglesia en Mi Iglesia+ ';
      el.href = 'https://wa.me/?text=' + encodeURIComponent(text + url);
    }

    window.toggleSharePopup = function() {
      actualizarShareLinks();
      const popup = document.getElementById('share-popup');
      popupAbierto = !popupAbierto;
      popup.style.display = popupAbierto ? 'block' : 'none';
    };

    window.cerrarSharePopup = function() {
      document.getElementById('share-popup').style.display = 'none';
      popupAbierto = false;
    };

    window.shareNativoIglesia = function() {
      cerrarSharePopup();
      const url = window._shareUrl || window.location.href;
      if (navigator.share) {
        navigator.share({ title: document.title, text: '🙏 Mirá esta iglesia en Mi Iglesia+ ', url }).catch(()=>{});
      } else {
        navigator.clipboard.writeText(url).then(() => alert('¡Link copiado!'));
      }
    };

    window.copiarLinkIglesia = function() {
      const url = window._shareUrl || window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const lbl = document.getElementById('shareCopyLabelIglesia');
        lbl.textContent = '✅ ¡Copiado!';
        setTimeout(() => { lbl.textContent = 'Copiar link'; cerrarSharePopup(); }, 1800);
      });
    };

    document.addEventListener('click', function(e) {
      const bubble = document.getElementById('share-bubble');
      const popup  = document.getElementById('share-popup');
      if (bubble && popup && !bubble.contains(e.target) && !popup.contains(e.target)) {
        cerrarSharePopup();
      }
    });
  })();
  </script>
</body>
</html>
