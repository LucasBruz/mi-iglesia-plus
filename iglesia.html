  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --primary: #FF6B5B;
      --primary-light: #fff0ee;
      --primary-dark: #e85444;
      --dark: #0f0f0f;
      --dark2: #1a1a1a;
      --gray: #6b7280;
      --gray-light: #9ca3af;
      --border: #e5e7eb;
      --border-light: #f3f4f6;
      --bg: #f9fafb;
      --white: #ffffff;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.1), 0 4px 12px rgba(0,0,0,.06);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--dark);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: .75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display:flex; align-items:center; gap:.6rem; text-decoration:none; }
    .nav-logo img { height:36px; width:36px; border-radius:10px; object-fit:contain; }
    .nav-logo-text { font-size:1rem; font-weight:800; color:var(--dark); letter-spacing:-.3px; }
    .nav-logo-text span { color:var(--primary); }
    .btn {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.55rem 1.1rem; border-radius:var(--radius-sm);
      font-family:'Inter',sans-serif; font-size:.85rem; font-weight:600;
      text-decoration:none; border:0; cursor:pointer; transition:all .18s;
    }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-dark); transform:translateY(-1px); box-shadow:0 4px 12px rgba(255,107,91,.35); }
    .btn-outline { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
    .btn-outline:hover { background:var(--primary-light); }

    /* ── HERO ── */
    .church-hero {
      position:relative; overflow:hidden;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 3.5rem 1.5rem 2.5rem;
      color:#fff; text-align:center;
    }
    .church-hero::before {
      content:''; position:absolute; inset:0;
      background-image: url('assets/fondo.png');
      background-size:cover; background-position:center;
      opacity:.25; z-index:0;
    }
    .church-hero::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(15,15,15,.3) 0%, rgba(15,15,15,.6) 100%);
      z-index:1;
    }
    .church-hero > * { position:relative; z-index:2; }

    .hero-logo-wrap {
      width:96px; height:96px; margin:0 auto 1.2rem;
      border-radius:22px; overflow:hidden;
      background:#fff;
      box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 3px rgba(255,255,255,.15);
      padding:5px;
    }
    .hero-logo-wrap img { width:100%; height:100%; object-fit:contain; border-radius:18px; }
    .hero-logo-placeholder {
      width:96px; height:96px; margin:0 auto 1.2rem;
      border-radius:22px; background:rgba(255,255,255,.1);
      display:flex; align-items:center; justify-content:center;
      font-size:2.5rem;
      border:2px solid rgba(255,255,255,.2);
    }

    .church-hero h1 {
      font-size:1.8rem; font-weight:800; letter-spacing:-.5px;
      margin-bottom:.3rem; line-height:1.15;
    }
    .hero-ciudad {
      color:rgba(255,255,255,.65); font-size:.88rem; font-weight:500;
      margin-bottom:.35rem; display:flex; align-items:center; justify-content:center; gap:.3rem;
    }
    .hero-pastor {
      color:rgba(255,255,255,.5); font-size:.82rem;
      margin-bottom:1.4rem;
    }

    .hero-actions {
      display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap;
    }
    .hero-btn {
      display:inline-flex; align-items:center; gap:.45rem;
      padding:.55rem 1.1rem; border-radius:999px;
      font-family:'Inter',sans-serif; font-size:.82rem; font-weight:600;
      border:0; cursor:pointer; transition:all .18s;
    }
    .hero-btn-notif { background:var(--primary); color:#fff; }
    .hero-btn-notif:hover { background:var(--primary-dark); }
    .hero-btn-share { background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25); }
    .hero-btn-share:hover { background:rgba(255,255,255,.22); }
    .hero-btn-follow { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); }
    .hero-btn-follow:hover { background:rgba(255,255,255,.2); }
    .hero-btn-follow.following { background:rgba(255,255,255,.2); border-color:rgba(255,255,255,.4); }

    /* ── LAYOUT ── */
    .container { max-width:860px; margin:0 auto; padding:0 1.25rem; }
    .section { padding:2.5rem 1.25rem; }
    .section-alt { background:#fff; }

    .section-header {
      display:flex; align-items:center; gap:.75rem;
      margin-bottom:1.5rem;
    }
    .section-icon {
      width:36px; height:36px; border-radius:10px;
      background:var(--primary-light);
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; flex-shrink:0;
    }
    .section-title {
      font-size:1.1rem; font-weight:700; letter-spacing:-.3px; color:var(--dark);
    }
    .section-divider {
      flex:1; height:1px; background:var(--border);
    }

    /* ── INFO CARD ── */
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; align-items:start; }
    @media(max-width:640px){ .info-grid { grid-template-columns:1fr; } }

    .info-card {
      background:#fff; border:1px solid var(--border);
      border-radius:var(--radius-lg); overflow:hidden;
      box-shadow:var(--shadow-sm);
    }
    .info-row {
      display:flex; align-items:flex-start; gap:.85rem;
      padding:.85rem 1.1rem; border-bottom:1px solid var(--border-light);
    }
    .info-row:last-child { border-bottom:0; }
    .info-row-icon {
      width:34px; height:34px; border-radius:9px;
      background:var(--border-light);
      display:flex; align-items:center; justify-content:center;
      font-size:.95rem; flex-shrink:0;
    }
    .info-row-body { display:flex; flex-direction:column; gap:.1rem; min-width:0; }
    .info-row-label { font-size:.72rem; font-weight:600; color:var(--gray-light); text-transform:uppercase; letter-spacing:.06em; }
    .info-row-value { font-size:.88rem; font-weight:600; color:var(--dark); word-break:break-word; }
    .info-row-value a { color:var(--primary); text-decoration:none; }

    .map-card {
      border-radius:var(--radius-lg); overflow:hidden;
      border:1px solid var(--border); height:220px;
      box-shadow:var(--shadow-sm);
      background:#f0f0f0;
    }
    .map-card iframe { width:100%; height:100%; border:0; display:block; }
    .map-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:.5rem;
      color:var(--gray-light); font-size:.85rem; text-align:center; padding:1rem;
    }

    /* ── EVENTS ── */
    .events-list { display:flex; flex-direction:column; gap:.75rem; }
    .event-card {
      background:#fff; border:1px solid var(--border);
      border-radius:var(--radius-md); padding:1rem 1.1rem;
      display:flex; align-items:center; gap:1rem;
      box-shadow:var(--shadow-sm);
      transition:box-shadow .18s, transform .18s;
    }
    .event-card:hover { box-shadow:var(--shadow-md); transform:translateY(-1px); }
    .event-date {
      min-width:52px; text-align:center; flex-shrink:0;
      background:var(--primary-light); border-radius:var(--radius-sm);
      padding:.5rem .4rem;
    }
    .event-date .day { font-size:1.4rem; font-weight:800; color:var(--primary); line-height:1; }
    .event-date .month { font-size:.65rem; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.06em; }
    .event-info { min-width:0; }
    .event-info h4 { font-size:.9rem; font-weight:700; margin-bottom:.2rem; }
    .event-info .event-meta { font-size:.78rem; color:var(--gray); display:flex; align-items:center; gap:.3rem; }
    .event-info .event-desc { font-size:.8rem; color:var(--gray-light); margin-top:.2rem; }

    /* ── PREDICAS ── */
    .predicas-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
    .predica-card {
      background:#fff; border:1px solid var(--border);
      border-radius:var(--radius-md); overflow:hidden;
      box-shadow:var(--shadow-sm);
      transition:box-shadow .18s, transform .18s;
    }
    .predica-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .predica-thumb {
      position:relative; aspect-ratio:16/9;
      background:#111; cursor:pointer; overflow:hidden;
    }
    .predica-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
    .predica-card:hover .predica-thumb img { transform:scale(1.04); }
    .predica-play {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.25); transition:background .2s;
    }
    .predica-card:hover .predica-play { background:rgba(0,0,0,.4); }
    .predica-play-btn {
      width:52px; height:52px; border-radius:50%;
      background:var(--primary); display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 20px rgba(255,107,91,.5);
      transition:transform .2s;
    }
    .predica-card:hover .predica-play-btn { transform:scale(1.1); }
    .predica-body { padding:.9rem 1rem; }
    .predica-body h4 { font-size:.88rem; font-weight:700; margin-bottom:.25rem; line-height:1.4; }
    .predica-body .predica-date { font-size:.75rem; color:var(--gray-light); font-weight:500; }

    /* ── FORMS ── */
    .forms-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
    @media(max-width:640px){ .forms-grid { grid-template-columns:1fr; } }

    .form-card {
      background:#fff; border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:1.75rem 1.5rem;
      box-shadow:var(--shadow-sm);
    }
    .form-card-header { margin-bottom:1.25rem; }
    .form-card-icon {
      width:44px; height:44px; border-radius:12px; margin-bottom:.75rem;
      display:flex; align-items:center; justify-content:center; font-size:1.3rem;
    }
    .form-card-icon.prayer { background:#fff0ee; }
    .form-card-icon.baptism { background:#eff6ff; }
    .form-card h3 { font-size:1rem; font-weight:700; margin-bottom:.3rem; }
    .form-card p { font-size:.82rem; color:var(--gray); line-height:1.55; }

    .form-group { margin-bottom:.85rem; }
    .form-label { display:block; font-size:.75rem; font-weight:600; color:var(--dark); margin-bottom:.35rem; letter-spacing:.02em; }
    .form-label .opt { color:var(--gray-light); font-weight:400; }
    .form-input {
      width:100%; padding:.65rem .85rem;
      border:1.5px solid var(--border); border-radius:var(--radius-sm);
      font-family:'Inter',sans-serif; font-size:.875rem; color:var(--dark);
      background:#fff; transition:border-color .15s, box-shadow .15s;
      outline:none;
    }
    .form-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(255,107,91,.12); }
    .form-input::placeholder { color:var(--gray-light); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; }

    .form-btn {
      width:100%; padding:.75rem;
      border:0; border-radius:var(--radius-sm);
      font-family:'Inter',sans-serif; font-size:.875rem; font-weight:600;
      cursor:pointer; transition:all .18s; margin-top:.25rem;
      display:flex; align-items:center; justify-content:center; gap:.4rem;
    }
    .form-btn-prayer { background:var(--primary); color:#fff; }
    .form-btn-prayer:hover { background:var(--primary-dark); box-shadow:0 4px 12px rgba(255,107,91,.3); }
    .form-btn-baptism { background:linear-gradient(135deg,#3b82f6,#1d4ed8); color:#fff; }
    .form-btn-baptism:hover { box-shadow:0 4px 12px rgba(59,130,246,.35); }
    .form-btn:disabled { opacity:.5; cursor:not-allowed; }
    .form-feedback { font-size:.8rem; min-height:1.2rem; margin-top:.6rem; font-weight:600; text-align:center; }

    /* ── OFRENDAS ── */
    .ofrendas-card {
      background: linear-gradient(135deg,#fff8f7,#fff);
      border:1.5px solid rgba(255,107,91,.18);
      border-radius:var(--radius-lg); padding:1.75rem 1.5rem;
      box-shadow:var(--shadow-sm);
    }
    .ofrendas-card h3 { font-size:1rem; font-weight:700; margin-bottom:.4rem; }
    .ofrendas-card p { color:var(--gray); font-size:.85rem; line-height:1.6; margin-bottom:1rem; }
    .ofrendas-chips { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:1rem; }
    .ofrendas-chip {
      background:#fff; border:1px solid var(--border);
      border-radius:999px; padding:.35rem .9rem;
      font-size:.8rem; font-weight:600; color:var(--dark);
      box-shadow:var(--shadow-sm);
    }
    .ofrendas-detail {
      background:var(--border-light); border-radius:var(--radius-sm);
      padding:.9rem 1rem; font-size:.85rem; line-height:1.9; color:var(--dark);
    }
    .ofrendas-detail strong { color:var(--primary); }

    /* ── GALERIA ── */
    .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.6rem; }
    .gallery-item {
      aspect-ratio:1; border-radius:var(--radius-sm); overflow:hidden;
      background:var(--border-light); cursor:zoom-in;
      box-shadow:var(--shadow-sm);
    }
    .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
    .gallery-item:hover img { transform:scale(1.06); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align:center; padding:2.5rem 1rem;
      background:#fff; border:1px dashed var(--border);
      border-radius:var(--radius-md);
    }
    .empty-state-icon { font-size:2rem; margin-bottom:.5rem; opacity:.4; }
    .empty-state p { color:var(--gray-light); font-size:.88rem; }

    /* ── FOOTER ── */
    .page-footer {
      background:var(--dark2); color:rgba(255,255,255,.45);
      text-align:center; padding:1.5rem;
      font-size:.82rem; position:relative;
    }
    .page-footer a { color:var(--primary); text-decoration:none; font-weight:600; }

    /* ── LOADING ── */
    .loading {
      display:flex; align-items:center; justify-content:center;
      min-height:65vh; flex-direction:column; gap:.9rem; color:var(--gray);
    }
    .spinner {
      width:36px; height:36px;
      border:3px solid var(--border); border-top-color:var(--primary);
      border-radius:50%; animation:spin .7s linear infinite;
    }
    .loading-text { font-size:.85rem; color:var(--gray-light); font-weight:500; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── LIVE BADGE ── */
    @keyframes pulse-red {
      0%,100% { box-shadow:0 0 0 0 rgba(220,38,38,.5); }
      50%      { box-shadow:0 0 0 7px rgba(220,38,38,0); }
    }
    .badge-live {
      display:inline-flex; align-items:center; gap:.35rem;
      background:#dc2626; color:#fff;
      padding:3px 10px; border-radius:999px;
      font-size:.72rem; font-weight:700; letter-spacing:.04em;
      animation:pulse-red 1.8s ease-in-out infinite;
    }
    .badge-live::before {
      content:''; width:6px; height:6px; border-radius:50%;
      background:#fff; display:inline-block;
    }

    /* ── SHARE POPUP ── */
    #share-bubble:hover { transform:translateY(-50%) scale(1.1); box-shadow:0 4px 20px rgba(255,107,91,.7); }
    #share-popup {
      display:none; position:fixed; bottom:5rem; right:1.2rem;
      background:#fff; border-radius:var(--radius-md);
      box-shadow:var(--shadow-lg); padding:.75rem;
      z-index:501; min-width:200px; border:1px solid var(--border);
    }
    #share-popup .sp-title { font-size:.72rem; font-weight:700; color:var(--gray-light); padding:.15rem .4rem .55rem; border-bottom:1px solid var(--border-light); margin-bottom:.4rem; text-transform:uppercase; letter-spacing:.06em; }
    #share-popup a, #share-popup button { display:flex; align-items:center; gap:.55rem; width:100%; padding:.5rem .7rem; border-radius:var(--radius-sm); font-size:.85rem; font-weight:600; text-decoration:none; border:0; background:none; cursor:pointer; font-family:'Inter',sans-serif; color:var(--dark); transition:background .12s; }
    #share-popup a:hover, #share-popup button:hover { background:var(--border-light); }
    #share-popup .sp-icon { width:26px; height:26px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:.9rem; flex-shrink:0; }

    /* ── RESPONSIVE ── */
    @media(max-width:600px){
      nav { padding:.6rem 1rem; }
      .church-hero { padding:2.5rem 1rem 2rem; }
      .hero-logo-wrap, .hero-logo-placeholder { width:80px; height:80px; border-radius:18px; }
      .church-hero h1 { font-size:1.45rem; }
      .section { padding:1.75rem 1rem; }
      .container { padding:0 1rem; }
      .predicas-grid { grid-template-columns:1fr; }
      .info-grid { grid-template-columns:1fr; }
      .forms-grid { grid-template-columns:1fr; }
      .map-card { height:180px; }
      .form-row { grid-template-columns:1fr; }
      .form-card { padding:1.25rem 1.1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="assets/logo.png" alt="Mi Iglesia+">
      <span class="nav-logo-text">Mi <span>Iglesia+</span></span>
    </a>
    <a class="btn btn-primary" href="registro.html">Registrar mi iglesia</a>
  </nav>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span class="loading-text">Cargando iglesia…</span>
    </div>
  </div>

  <div class="page-footer" style="position:relative">
    <p>Powered by <a href="index.html">Mi Iglesia+</a> · Conectados en un mismo lugar</p>
    <button id="share-bubble" onclick="toggleSharePopup()" title="Compartir"

      <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 0 0 18 8a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 0 0 6 9a3 3 0 1 0 3 3c0-.24-.04-.47-.09-.7l7.05-4.11A2.99 2.99 0 0 0 18 16.08z" fill="#fff"/>
      </svg>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, setDoc, deleteDoc, updateDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
    import { getMessaging, getToken, deleteToken } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBOj5yJQ2kcU4_xrUY1sDPB3XU3lWupX-A",
      authDomain: "miiglesia-plus.firebaseapp.com",
      projectId: "miiglesia-plus",

              return `<div id="envivo-embed-wrap" style="aspect-ratio:16/9;border-radius:var(--radius-lg);background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;box-shadow:var(--shadow-lg)"><div style="width:52px;height:52px;border:4px solid rgba(255,255,255,.15);border-top-color:#FF0000;border-radius:50%;animation:spin .9s linear infinite"></div><div style="text-align:center"><div style="color:#fff;font-weight:800;font-size:1rem;margin-bottom:.4rem">🔴 Transmisión en vivo</div><div style="color:rgba(255,255,255,.6);font-size:.85rem">Conectando…</div><div style="color:rgba(255,255,255,.35);font-size:.78rem;margin-top:.4rem">Cargando en <span id="retry-countdown">30</span>s</div></div></div>`;
            };

            enVivoHtml = `
              <section class="section" style="background:#0d0d0d;padding-top:2rem;padding-bottom:2rem">
                <div class="container">
                  <div class="section-header" style="margin-bottom:1rem">
                    <h2 class="section-title" style="color:#fff">🔴 En Vivo</h2>
                    <span class="badge-live" style="margin-left:.5rem">EN VIVO</span>
                  </div>
                  <div id="envivo-section-inner">${buildEmbed(ytId)}</div>
                  ${ev.titulo?`<p style="color:rgba(255,255,255,.9);font-size:.95rem;font-weight:700;margin-top:.9rem">${esc(ev.titulo)}</p>`:''}
                  ${ev.descripcion?`<p style="color:rgba(255,255,255,.5);font-size:.82rem;margin-top:.3rem">${esc(ev.descripcion)}</p>`:''}
                </div>
              </section>`;

            if (!ytId && ig.youtubeChannelId) {
              window._liveRetryChannelId = ig.youtubeChannelId;
              window._liveRetryCount = 30;
              if (window._liveRetryInterval) clearInterval(window._liveRetryInterval);
              window._liveRetryInterval = setInterval(async () => {
                window._liveRetryCount--;
                const countEl = document.getElementById('retry-countdown');
                if (countEl) countEl.textContent = window._liveRetryCount;
                if (window._liveRetryCount <= 0) {
                  window._liveRetryCount = 30;
                  const nuevoId = await buscarLiveEnCanal(window._liveRetryChannelId);
                  if (nuevoId) {
                    clearInterval(window._liveRetryInterval);
                    const inner = document.getElementById('envivo-section-inner');
                    if (inner) inner.innerHTML = `<div style="aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;background:#000"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${nuevoId}?autoplay=1&rel=0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" style="border:0;display:block;width:100%;height:100%"></iframe></div>`;
                  }
                }
              }, 1000);
            }

          } else if (!ev.activo && ev.replay && ev.replayHasta && new Date(ev.replayHasta) > ahora) {
            const ytId     = extraerYtId(ev.url);
            const esYT     = ev.plataforma==='youtube'||(ev.url||'').includes('youtube')||(ev.url||'').includes('youtu.be');
            const esFB     = ev.plataforma==='facebook'||(ev.url||'').includes('facebook')||(ev.url||'').includes('fb.');
            const btnColor = esYT ? '#ff0000' : esFB ? '#1877F2' : '#555';
            const btnLabel = esYT ? '▶ Ver repetición en YouTube' : esFB ? '📘 Ver repetición en Facebook' : '▶ Ver repetición';

            const embedHtml = ytId
              ? `<div class="predica-thumb" onclick="playVideo(this,'${ytId}')" style="aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg)">
                   <img src="https://img.youtube.com/vi/${ytId}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${ytId}/hqdefault.jpg'" alt="${esc(ev.titulo||'Transmisión')}" style="width:100%;height:100%;object-fit:cover;display:block">
                   <div class="predica-play"><div class="predica-play-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div></div>
                 </div>`
              : `<a href="${esc(ev.url||'#')}" target="_blank" rel="noopener"
                   style="display:flex;align-items:center;justify-content:center;gap:1rem;aspect-ratio:16/9;background:#111;border-radius:var(--radius-lg);color:#fff;text-decoration:none;font-weight:700;font-size:1rem;box-shadow:var(--shadow-lg)">
                   <svg width="48" height="34" viewBox="0 0 64 45" fill="none"><rect width="64" height="45" rx="10" fill="${btnColor}"/><path d="M26 13.5L44 22.5L26 31.5V13.5Z" fill="white"/></svg>
                   <span>${btnLabel}</span>
                 </a>`;

            const btnExterno = ev.url ? `<a href="${esc(ev.url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:.5rem;margin-top:1rem;background:${btnColor};color:#fff;border-radius:999px;padding:.5rem 1.2rem;font-weight:600;font-size:.85rem;text-decoration:none">${btnLabel}</a>` : '';

            replayHtml = `
              <section class="section" style="background:#0d0d0d;padding-top:2rem;padding-bottom:2rem">
                <div class="container">
                  <div class="section-header" style="margin-bottom:1rem">
                    <h2 class="section-title" style="color:#fff">📺 Transmisión reciente</h2>
                    <span style="font-size:.72rem;font-weight:700;background:#6b7280;color:#fff;padding:3px 10px;border-radius:999px;margin-left:.5rem;letter-spacing:.04em">HOY</span>
                  </div>
                  ${embedHtml}
                  ${ev.titulo?`<p style="color:rgba(255,255,255,.85);font-size:.95rem;font-weight:700;margin-top:.9rem">${esc(ev.titulo)}</p>`:''}
                  ${ev.descripcion?`<p style="color:rgba(255,255,255,.5);font-size:.82rem;margin-top:.3rem">${esc(ev.descripcion)}</p>`:''}
                  ${btnExterno}
                  <p style="color:rgba(255,255,255,.25);font-size:.75rem;margin-top:.6rem">⏰ Disponible hasta la medianoche</p>
                </div>
              </section>`;
          }
        }
      } catch(_) {}

      if (ig.youtubeChannelId && !enVivoHtml) {
        const liveVideoId = await buscarLiveEnCanal(ig.youtubeChannelId);
        if (liveVideoId) {
          enVivoHtml = `
            <section class="section" style="background:#0d0d0d;padding-top:2rem;padding-bottom:2rem">
              <div class="container">
                <div class="section-header" style="margin-bottom:1rem">
                  <h2 class="section-title" style="color:#fff">🔴 En Vivo</h2>
                  <span class="badge-live" style="margin-left:.5rem">EN VIVO</span>
                </div>
                <div style="aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;background:#000;box-shadow:var(--shadow-lg)">
                  <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${liveVideoId}?autoplay=1&rel=0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" style="border:0;display:block;width:100%;height:100%"></iframe>
                </div>
              </div>
            </section>`;
        } else if (!replayHtml) {
          youtubeHtml = `
            <section class="section" style="background:#0d0d0d;padding-top:2rem;padding-bottom:2rem">
              <div class="container">
                <div class="section-header" style="margin-bottom:1rem">
                  <h2 class="section-title" style="color:#fff">📺 Canal de YouTube</h2>
                </div>
                <div onclick="window.open('https://www.youtube.com/channel/${esc(ig.youtubeChannelId)}','_blank')"
                  style="aspect-ratio:16/9;position:relative;cursor:pointer;border-radius:var(--radius-lg);overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#0f3460);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem">
                  <svg width="64" height="45" viewBox="0 0 64 45" fill="none"><rect width="64" height="45" rx="10" fill="#FF0000"/><path d="M26 13.5L44 22.5L26 31.5V13.5Z" fill="white"/></svg>
                  <div style="text-align:center">
                    <div style="color:#fff;font-weight:800;font-size:.95rem;margin-bottom:.25rem">${esc(igNombre)}</div>
                    <div style="color:rgba(255,255,255,.55);font-size:.82rem">Tocá para ver el canal</div>
                  </div>
                  <div style="display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:.45rem 1rem">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    <span style="color:#fff;font-weight:600;font-size:.82rem">Ver canal</span>
                  </div>
                </div>
                <p style="color:rgba(255,255,255,.25);font-size:.75rem;margin-top:.6rem;text-align:center">Cuando la iglesia transmita en vivo, el stream aparece aquí automáticamente.</p>
              </div>
            </section>`;
        }
      }

      appEl.innerHTML = heroHtml + websiteHtml + enVivoHtml + replayHtml + youtubeHtml + videoHtml + fotoPastorHtml + infoHtml + galeriaHtml + ofrendarHtml + eventosHtml + predicasHtml + peticionesHtml;

      renderBtnNotif(estaSuscripto());
      activarFormularios();
    }

    function activarFormularios() {
      document.getElementById('btnEnviarPeticion')?.addEventListener('click', async () => {
        const nombre  = (document.getElementById('pet_nombre')?.value||'').trim();
        const apellido= (document.getElementById('pet_apellido')?.value||'').trim();
        const tel     = (document.getElementById('pet_tel')?.value||'').trim();
        const mensaje = (document.getElementById('pet_mensaje')?.value||'').trim();
        const msgEl   = document.getElementById('petMsg');
        const btn     = document.getElementById('btnEnviarPeticion');
        if (!nombre||!mensaje) { msgEl.textContent='❌ Completá tu nombre y tu petición.'; msgEl.style.color='#dc3545'; return; }
        btn.disabled=true; btn.textContent='Enviando…';
        try {
          const {addDoc,collection,serverTimestamp} = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
          await addDoc(collection(db,'iglesias',iglesiaId,'peticiones'),{nombre,apellido,tel,mensaje,leida:false,creadoEn:serverTimestamp()});
          msgEl.textContent='✅ ¡Petición enviada!'; msgEl.style.color='#16a34a';
          ['pet_nombre','pet_apellido','pet_tel','pet_mensaje'].forEach(id=>{document.getElementById(id).value='';});
          btn.textContent='🙏 Petición enviada';
        } catch(e){msgEl.textContent='❌ Error: '+e.message;msgEl.style.color='#dc3545';btn.disabled=false;btn.textContent='🙏 Enviar petición';}
      });

      document.getElementById('btnEnviarBautismo')?.addEventListener('click', async () => {
        const nombre  = (document.getElementById('baut_nombre')?.value||'').trim();
        const apellido= (document.getElementById('baut_apellido')?.value||'').trim();
        const tel     = (document.getElementById('baut_tel')?.value||'').trim();
        const mensaje = (document.getElementById('baut_mensaje')?.value||'').trim();
        const msgEl   = document.getElementById('bautMsg');
        const btn     = document.getElementById('btnEnviarBautismo');
        if (!nombre){msgEl.textContent='❌ Ingresá tu nombre.';msgEl.style.color='#dc3545';return;}
        btn.disabled=true; btn.textContent='Enviando…';
        try {
          const {addDoc,collection,serverTimestamp} = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
          await addDoc(collection(db,'iglesias',iglesiaId,'bautismos'),{nombre,apellido,tel,mensaje,leido:false,creadoEn:serverTimestamp()});
          msgEl.textContent='✅ ¡Inscripción enviada!'; msgEl.style.color='#1d4ed8';
          ['baut_nombre','baut_apellido','baut_tel','baut_mensaje'].forEach(id=>{document.getElementById(id).value='';});
          btn.textContent='💧 Inscripción enviada';
        } catch(e){msgEl.textContent='❌ Error: '+e.message;msgEl.style.color='#dc3545';btn.disabled=false;btn.textContent='💧 Inscribirme al bautismo';}
      });
    }

    window.compartir = function() {
      const url = window.location.href;
      if (navigator.share) { navigator.share({title:document.title,url}); }
      else { navigator.clipboard.writeText(url).then(()=>alert('¡Enlace copiado!')); }
    };

    window.abrirFoto = function(url) {
      const lb=document.getElementById('lightbox'); const img=document.getElementById('lightboxImg');
      img.src=url; lb.style.display='flex'; document.body.style.overflow='hidden';
    };

    window.playVideo = function(el, ytId) {
      el.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" style="border:0;display:block;width:100%;height:100%"></iframe>`;
      el.style.cursor='default';
    };

    render().catch(e=>{
      document.getElementById('app').innerHTML=`<div style="text-align:center;padding:4rem;color:#888"><h2>Error al cargar</h2><p>${e.message}</p></div>`;
    });
  </script>

  <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;padding:1rem" onclick="this.style.display='none';document.body.style.overflow=''">
    <img id="lightboxImg" src="" alt="" style="max-width:100%;max-height:90vh;border-radius:var(--radius-md);object-fit:contain">
  </div>

  <script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(()=>{});}</script>

  <style>
    #share-popup { animation:none; }
    @keyframes spFadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  </style>

  <div id="share-popup">
    <div class="sp-title">Compartir</div>
    <button onclick="shareNativoIglesia()"><span class="sp-icon" style="background:#FF6B5B">🔗</span> Compartir</button>
    <a id="shareWaLinkIglesia" href="" target="_blank" rel="noopener" onclick="cerrarSharePopup()">
      <span class="sp-icon" style="background:#25D366">
        <svg width="14" height="14" viewBox="0 0 32 32" fill="none"><path d="M16 2C8.268 2 2 8.268 2 16c0 2.478.655 4.8 1.8 6.807L2 30l7.38-1.773A13.93 13.93 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2z" fill="#fff"/><path d="M16 4.5c-6.351 0-11.5 5.149-11.5 11.5 0 2.14.588 4.143 1.613 5.858l.243.407-1.03 3.76 3.87-1.015.394.228A11.45 11.45 0 0 0 16 27.5c6.351 0 11.5-5.149 11.5-11.5S22.351 4.5 16 4.5z" fill="#25D366"/><path d="M21.003 18.77c-.307-.154-1.816-.896-2.097-.998-.281-.103-.486-.154-.69.154-.204.307-.791.998-.97 1.203-.178.204-.357.23-.664.077-.307-.154-1.295-.477-2.466-1.522-.911-.813-1.526-1.816-1.705-2.123-.178-.307-.019-.473.134-.626.137-.137.307-.358.46-.537.154-.178.205-.307.307-.511.103-.205.051-.384-.025-.537-.077-.154-.69-1.664-.945-2.277-.249-.597-.502-.516-.69-.526l-.588-.01c-.204 0-.537.077-.818.384-.281.307-1.073 1.049-1.073 2.558s1.099 2.967 1.252 3.171c.154.205 2.163 3.303 5.24 4.632.733.316 1.305.505 1.751.646.736.234 1.406.201 1.936.122.590-.088 1.816-.742 2.073-1.459.256-.716.256-1.33.179-1.459-.076-.128-.281-.205-.588-.358z" fill="#fff"/></svg>
      </span> WhatsApp
    </a>
    <button onclick="copiarLinkIglesia()"><span class="sp-icon" style="background:var(--border-light)">📋</span><span id="shareCopyLabelIglesia">Copiar link</span></button>
  </div>

  <script>
  (function(){
    let open = false;
    function updLinks(){
      const el=document.getElementById('shareWaLinkIglesia'); if(!el)return;
      const url=window._shareUrl||window.location.href;
      el.href='https://wa.me/?text='+encodeURIComponent('🙏 Visitá esta iglesia en Mi Iglesia+ '+url);
    }
    window.toggleSharePopup=function(){updLinks();const p=document.getElementById('share-popup');open=!open;p.style.display=open?'block':'none';if(open){p.style.animation='spFadeUp .18s ease';}};
    window.cerrarSharePopup=function(){document.getElementById('share-popup').style.display='none';open=false;};
    window.shareNativoIglesia=function(){cerrarSharePopup();const url=window._shareUrl||window.location.href;if(navigator.share){navigator.share({title:document.title,text:'🙏 Mirá esta iglesia en Mi Iglesia+ ',url}).catch(()=>{});}else{navigator.clipboard.writeText(url).then(()=>alert('¡Link copiado!'));}};
    window.copiarLinkIglesia=function(){const url=window._shareUrl||window.location.href;navigator.clipboard.writeText(url).then(()=>{const l=document.getElementById('shareCopyLabelIglesia');l.textContent='✅ ¡Copiado!';setTimeout(()=>{l.textContent='Copiar link';cerrarSharePopup();},1800);});};
    document.addEventListener('click',function(e){const b=document.getElementById('share-bubble');const p=document.getElementById('share-popup');if(b&&p&&!b.contains(e.target)&&!p.contains(e.target))cerrarSharePopup();});
  })();
  </script>
</body>
</html>
