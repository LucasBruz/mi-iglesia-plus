<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mi Iglesia+ | Cargando...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#FF6B5B;--dark:#1a1a1a;--gray:#666;--border:#e0e0e0;--bg:#fafafa}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark)}

    /* NAV */
    nav{background:#fff;padding:.8rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;font-weight:800;font-size:1.1rem;color:var(--dark)}
    .nav-logo img{height:38px;width:38px;object-fit:contain}
    .nav-logo span{color:var(--primary)}
    .btn{display:inline-block;padding:.6rem 1.2rem;border-radius:8px;font-weight:700;font-family:'Poppins',sans-serif;text-decoration:none;border:0;cursor:pointer;font-size:.9rem;transition:all .2s}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(255,107,91,.3)}
    .btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary)}

    /* HERO IGLESIA */
    .church-hero{
      background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);
      padding:3rem 1.5rem 2rem;
      color:#fff;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .church-hero::before{
      content:'';position:absolute;inset:0;
      background-image:url('assets/fondo.png');
      background-size:cover;background-position:center center;
      z-index:0;
    }
    .church-hero::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(to bottom, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.5) 100%);
      z-index:1;
    }
    .church-hero > *{position:relative;z-index:2}
    .church-logo{
      width:110px;height:110px;
      border-radius:20px;
      object-fit:contain;
      background:#fff;
      margin:0 auto 1.2rem;
      display:block;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
      padding:6px;
    }
    .church-logo-placeholder{
      width:110px;height:110px;border-radius:20px;
      background:rgba(255,255,255,0.1);
      margin:0 auto 1.2rem;
      display:flex;align-items:center;justify-content:center;
      font-size:3rem;border:2px solid rgba(255,255,255,0.2);
    }
    .church-hero h1{font-size:2rem;font-weight:800;margin-bottom:.4rem}
    .church-hero .ciudad{color:rgba(255,255,255,0.7);font-size:1rem;margin-bottom:.8rem}
    .church-hero .pastor{color:rgba(255,255,255,0.55);font-size:.9rem;margin-bottom:1.5rem}
    .hero-badges{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
    .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .8rem;border-radius:999px;font-size:.8rem;font-weight:600;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.15)}
    .share-btn{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.25);padding:.5rem 1rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.85rem;cursor:pointer;font-weight:600;transition:background .2s}
    .share-btn:hover{background:rgba(255,255,255,0.22)}

    /* SECCIONES */
    .container{max-width:900px;margin:0 auto;padding:0 1rem}
    .section{padding:2rem 1rem}
    .section-title{font-size:1.3rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
    .section-title::after{content:'';flex:1;height:2px;background:var(--border);margin-left:.5rem}

    /* INFO + MAPA */
    .info-mapa{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start}
    @media(max-width:640px){.info-mapa{grid-template-columns:1fr}}
    .info-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:1.2rem}
    .info-row{display:flex;align-items:flex-start;gap:.7rem;padding:.6rem 0;border-bottom:1px solid #f5f5f5;font-size:.92rem}
    .info-row:last-child{border-bottom:0}
    .info-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
    .info-label{color:var(--gray);font-size:.8rem}
    .info-value{font-weight:600;color:var(--dark)}
    .map-wrap{border-radius:14px;overflow:hidden;border:1px solid var(--border);height:220px;background:#f0f0f0;display:flex;align-items:center;justify-content:center}
    .map-wrap iframe{width:100%;height:100%;border:0;display:block}
    .map-placeholder{color:var(--gray);text-align:center;font-size:.9rem;padding:1rem}

    /* OFRENDAS */
    .ofrendas-box{background:linear-gradient(135deg,#fff8f7 0%,#fff 100%);border:2px solid rgba(255,107,91,0.2);border-radius:14px;padding:1.5rem;text-align:center}
    .ofrendas-box h3{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;color:var(--dark)}
    .ofrendas-box p{color:var(--gray);font-size:.9rem;margin-bottom:1rem;line-height:1.6}
    .ofrendas-metodos{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;margin-bottom:1rem}
    .metodo-chip{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;font-size:.85rem;font-weight:600;color:var(--dark)}
    .ofrendas-detalle{background:#f9f9f9;border-radius:10px;padding:1rem;text-align:left;font-size:.88rem;line-height:1.8;color:var(--dark)}
    .ofrendas-detalle strong{color:var(--primary)}

    /* EVENTOS */
    .eventos-list{display:flex;flex-direction:column;gap:.8rem}
    .evento-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem}
    .evento-fecha{background:var(--primary);color:#fff;border-radius:10px;padding:.4rem .7rem;text-align:center;min-width:48px;flex-shrink:0}
    .evento-fecha .dia{font-size:1.3rem;font-weight:800;line-height:1}
    .evento-fecha .mes{font-size:.7rem;font-weight:600;text-transform:uppercase}
    .evento-info h4{font-size:.95rem;font-weight:700;margin-bottom:.2rem}
    .evento-info .lugar{color:var(--gray);font-size:.82rem;display:flex;align-items:center;gap:.3rem}
    .empty-state{text-align:center;color:var(--gray);padding:2rem;background:#fff;border:1px solid var(--border);border-radius:12px;font-size:.92rem}

    /* PRÉDICAS */
    .predicas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
    .predica-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .predica-card iframe{width:100%;aspect-ratio:16/9;display:block;border:0}
    .predica-body{padding:.8rem}
    .predica-body h4{font-size:.92rem;font-weight:700;margin-bottom:.3rem}
    .predica-body .fecha{color:var(--gray);font-size:.8rem}

    /* FORMULARIOS PÚBLICOS */
    .form-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.5rem;display:flex;flex-direction:column;gap:.2rem}
    .form-icon{font-size:2rem;margin-bottom:.3rem}
    .form-title{font-size:1.1rem;font-weight:800;margin-bottom:.3rem}
    .form-desc{color:var(--gray);font-size:.85rem;line-height:1.5;margin-bottom:.8rem}
    .form-group{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.6rem}
    .form-label{font-size:.83rem;font-weight:700;color:var(--dark)}
    .opt{font-weight:400;color:#aaa;font-size:.78rem}
    .form-input{width:100%;padding:.65rem .9rem;border:1px solid var(--border);border-radius:8px;font-family:'Poppins',sans-serif;font-size:.88rem;color:var(--dark);transition:border-color .2s;background:#fff}
    .form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,91,.1)}
    .form-btn{width:100%;padding:.75rem;border:0;border-radius:10px;background:var(--primary);color:#fff;font-weight:700;font-family:'Poppins',sans-serif;font-size:.92rem;cursor:pointer;transition:opacity .2s;margin-top:.4rem}
    .form-btn:hover{opacity:.88}
    .form-btn:disabled{opacity:.5;cursor:not-allowed}
    .form-feedback{font-size:.83rem;min-height:1.2rem;margin-top:.4rem;font-weight:600}
    @media(max-width:640px){
      .forms-grid{grid-template-columns:1fr!important}
    }

    /* PETICIONES */
    .peticiones-list{display:flex;flex-direction:column;gap:.8rem}
    .peticion-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;display:flex;gap:.8rem;align-items:flex-start}
    .peticion-icon{font-size:1.4rem;flex-shrink:0}
    .peticion-titulo{font-weight:700;font-size:.92rem;margin-bottom:.3rem}
    .peticion-detalle{color:var(--gray);font-size:.85rem;line-height:1.5}

    /* FOOTER */
    .page-footer{background:var(--dark);color:rgba(255,255,255,.5);text-align:center;padding:1.5rem;font-size:.85rem}
    .page-footer a{color:var(--primary);text-decoration:none;font-weight:600}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:1rem;color:var(--gray)}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:600px){
      /* NAV */
      nav{padding:.7rem 1rem}
      nav a.btn{padding:.5rem .85rem;font-size:.8rem}

      /* HERO */
      .church-hero{padding:2rem 1rem 1.5rem}
      .church-logo{width:80px;height:80px;border-radius:14px}
      .church-logo-placeholder{width:80px;height:80px;font-size:2rem}
      .church-hero h1{font-size:1.35rem;margin-bottom:.3rem}
      .church-hero .ciudad{font-size:.88rem;margin-bottom:.5rem}
      .church-hero .pastor{font-size:.82rem;margin-bottom:1rem}
      .hero-badges{gap:.4rem;margin-bottom:1rem}
      .badge{font-size:.75rem;padding:.25rem .6rem}

      /* BOTONES del hero */
      #btnNotif, .share-btn{
        padding:.55rem .9rem;font-size:.82rem
      }

      /* SECCIONES */
      .section{padding:1.5rem .8rem}
      .section-title{font-size:1.1rem}
      .container{padding:0 .8rem}

      /* INFO + MAPA apilados */
      .info-mapa{grid-template-columns:1fr;gap:1rem}
      .map-wrap{height:180px}

      /* PREDICAS: 1 col */
      .predicas-grid{grid-template-columns:1fr;gap:.8rem}

      /* OFRENDAS */
      .ofrendas-box{padding:1rem}
      .ofrendas-metodos{gap:.5rem}
      .metodo-chip{font-size:.8rem;padding:.4rem .7rem}

      /* EVENTOS */
      .evento-card{padding:.8rem 1rem;gap:.8rem}
      .evento-info h4{font-size:.88rem}

      /* PETICIONES */
      .peticion-card{padding:.8rem 1rem}
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">
      <img src="assets/logo.png" alt="Mi Iglesia+">
      Mi <span>&nbsp;Iglesia+</span>
    </a>
    <a class="btn btn-primary" href="registro.html">Registrar mi iglesia</a>
  </nav>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <span>Cargando iglesia…</span>
    </div>
  </div>

  <div class="page-footer">
    <p>Powered by <a href="index.html">Mi Iglesia+</a> · Conectando comunidades de fe</p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';
    import { getMessaging, getToken, deleteToken } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBOj5yJQ2kcU4_xrUY1sDPB3XU3lWupX-A",
      authDomain: "miiglesia-plus.firebaseapp.com",
      projectId: "miiglesia-plus",
      storageBucket: "miiglesia-plus.firebasestorage.app",
      messagingSenderId: "407699856167",
      appId: "1:407699856167:web:5d421d407ab7c9789aa702"
    };
    const app       = initializeApp(firebaseConfig);
    const db        = getFirestore(app);
    const messaging = getMessaging(app);

    const VAPID_KEY  = 'BC3jOJ8lqkrHbiPrZ98XMeyRsmWbT4kqIjFWLIWRb2mSR8lKsIaDLNqmCnuvMFi2kpdUc59ugbKDv6bKQO2j8HE';
    const params     = new URLSearchParams(window.location.search);
    const iglesiaId  = params.get('id');

    function fmtFecha(d) {
      try {
        const fecha = d?.seconds ? new Date(d.seconds*1000) : new Date(d);
        return { dia: fecha.getDate(), mes: fecha.toLocaleString('es',{month:'short'}), full: fecha.toLocaleDateString('es') };
      } catch { return { dia:'?', mes:'?', full:'?' }; }
    }

    function escHtml(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function buildMapEmbed(direccion) {
      if (!direccion) return '';
      const q = encodeURIComponent(direccion);
      return `<iframe src="https://maps.google.com/maps?q=${q}&output=embed&z=15" loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>`;
    }

    // ── NOTIFICACIONES ──
    const STORAGE_KEY = `notif_${iglesiaId}`;

    function estaSuscripto() {
      return localStorage.getItem(STORAGE_KEY) === '1';
    }

    async function toggleNotificaciones() {
      const btn = document.getElementById('btnNotif');
      if (!btn) return;
      btn.disabled = true;

      if (estaSuscripto()) {
        // DESUSCRIBIR
        try {
          const token = localStorage.getItem(`token_${iglesiaId}`);
          if (token) {
            await deleteDoc(doc(db, 'suscriptores', iglesiaId, 'tokens', token));
            await deleteToken(messaging);
          }
          localStorage.removeItem(STORAGE_KEY);
          localStorage.removeItem(`token_${iglesiaId}`);
          renderBtnNotif(false);
        } catch(e) { alert('Error al desuscribirse: ' + e.message); }
      } else {
        // SUSCRIBIR
        try {
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') {
            alert('Necesitás dar permiso de notificaciones en tu navegador.');
            btn.disabled = false; return;
          }
          const token = await getToken(messaging, { vapidKey: VAPID_KEY });
          if (!token) throw new Error('No se pudo obtener el token');

          // Guardar en Firestore: suscriptores/{iglesiaId}/tokens/{token}
          await setDoc(doc(db, 'suscriptores', iglesiaId, 'tokens', token), {
            token,
            creadoEn: new Date().toISOString(),
            plataforma: navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop'
          });

          localStorage.setItem(STORAGE_KEY, '1');
          localStorage.setItem(`token_${iglesiaId}`, token);
          renderBtnNotif(true);
          alert('✅ ¡Te suscribiste! Recibirás notificaciones de esta iglesia.');
        } catch(e) {
          alert('Error al suscribirse: ' + e.message);
        }
      }
      btn.disabled = false;
    }

    function renderBtnNotif(suscripto) {
      const btn = document.getElementById('btnNotif');
      if (!btn) return;
      if (suscripto) {
        btn.textContent = '🔕 Desactivar notificaciones';
        btn.style.background = 'rgba(255,255,255,0.1)';
        btn.style.border = '1px solid rgba(255,255,255,0.3)';
      } else {
        btn.textContent = '🔔 Recibir notificaciones';
        btn.style.background = 'var(--primary)';
        btn.style.border = 'none';
      }
    }

    window.toggleNotificaciones = toggleNotificaciones;

    async function render() {
      const app = document.getElementById('app');

      if (!iglesiaId) {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:#888">
          <h2>Iglesia no encontrada</h2>
          <p>El enlace no contiene un ID válido.</p>
          <p style="font-size:.75rem;color:#bbb;margin-top:.5rem;word-break:break-all">URL: ${window.location.href}</p>
          <a class="btn btn-primary" href="index.html" style="margin-top:1rem;display:inline-block">Volver al inicio</a>
        </div>`;
        return;
      }

      // Cargar datos de la iglesia
      let snap;
      try {
        snap = await getDoc(doc(db,'iglesias',iglesiaId));
      } catch(e) {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:#888">
          <h2>Error al cargar</h2>
          <p style="color:#dc3545;font-size:.9rem">${e.message}</p>
          <a class="btn btn-primary" href="index.html" style="margin-top:1rem;display:inline-block">Volver al inicio</a>
        </div>`;
        return;
      }
      if (!snap.exists()) {
        app.innerHTML = `<div style="text-align:center;padding:4rem;color:#888"><h2>Iglesia no disponible</h2><p>Esta iglesia no existe o aún no está activa.</p><a class="btn btn-primary" href="index.html" style="margin-top:1rem;display:inline-block">Volver al inicio</a></div>`;
        return;
      }

      const ig = snap.data();
      document.title = `${ig.nombre || 'Iglesia'} | Mi Iglesia+`;

      // Cargar subcolecciones en paralelo — cada una con su propio catch
      const [evSnap, predSnap, galSnap] = await Promise.all([
        getDocs(collection(db,'iglesias',iglesiaId,'eventos')).catch(()=>({docs:[]})),
        getDocs(collection(db,'iglesias',iglesiaId,'predicas')).catch(()=>({docs:[]})),
        getDocs(collection(db,'iglesias',iglesiaId,'galeria')).catch(()=>({docs:[]}))
      ]);

      const eventos  = evSnap.docs.map(d=>({id:d.id,...d.data()}))
                         .filter(e=>e.publico!==false)
                         .sort((a,b)=>(b.inicio?.seconds||0)-(a.inicio?.seconds||0));
      const predicas = predSnap.docs.map(d=>({id:d.id,...d.data()}))
                         .filter(p=>p.publico!==false);
      const galeria  = galSnap.docs.map(d=>({id:d.id,...d.data()}))
                         .filter(f=>f.publica!==false)
                         .sort((a,b)=>(b.creadoEn?.seconds||0)-(a.creadoEn?.seconds||0));

      // ── HERO ──
      const logoHtml = ig.logoUrl
        ? `<img class="church-logo" src="${escHtml(ig.logoUrl)}" alt="${escHtml(ig.nombre)}">`
        : `<div class="church-logo-placeholder">⛪</div>`;

      const heroHtml = `
        <div class="church-hero">
          ${logoHtml}
          <h1>${escHtml(ig.nombre)}</h1>
          <div class="ciudad">📍 ${escHtml(ig.ciudad||'')}</div>
          <div class="pastor">🧑‍💼 Pastor: ${escHtml(ig.pastor||'')}</div>
          <div class="hero-badges">
            ${ig.miembros ? `<span class="badge">👥 ${ig.miembros} miembros</span>` : ''}
            ${ig.telefono ? `<span class="badge">📞 ${escHtml(ig.telefono)}</span>` : ''}
            ${ig.emailContacto ? `<span class="badge">✉️ ${escHtml(ig.emailContacto)}</span>` : ''}
          </div>
          <div style="display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem">
            <button id="btnNotif" onclick="toggleNotificaciones()" style="padding:.55rem 1.1rem;border-radius:8px;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;font-size:.88rem;color:#fff;background:var(--primary);border:none;transition:all .2s">🔔 Recibir notificaciones</button>
            <button class="share-btn" onclick="compartir()">🔗 Compartir</button>
          </div>
        </div>`;

      // ── INFO + MAPA ──
      const mapaHtml = ig.direccion
        ? `<div class="map-wrap">${buildMapEmbed(ig.direccion + (ig.ciudad ? ', ' + ig.ciudad : ''))}</div>`
        : `<div class="map-wrap"><div class="map-placeholder">📍 Esta iglesia aún no cargó su dirección</div></div>`;

      const infoHtml = `
        <section class="section">
          <div class="container">
            <h2 class="section-title">ℹ️ Información</h2>
            <div class="info-mapa">
              <div class="info-card">
                ${ig.nombre     ? `<div class="info-row"><span class="info-icon">⛪</span><div><div class="info-label">Nombre</div><div class="info-value">${escHtml(ig.nombre)}</div></div></div>` : ''}
                ${ig.ciudad     ? `<div class="info-row"><span class="info-icon">📍</span><div><div class="info-label">Ciudad</div><div class="info-value">${escHtml(ig.ciudad)}</div></div></div>` : ''}
                ${ig.direccion  ? `<div class="info-row"><span class="info-icon">🗺️</span><div><div class="info-label">Dirección</div><div class="info-value">${escHtml(ig.direccion)}</div></div></div>` : ''}
                ${ig.pastor     ? `<div class="info-row"><span class="info-icon">🧑‍💼</span><div><div class="info-label">Pastor</div><div class="info-value">${escHtml(ig.pastor)}</div></div></div>` : ''}
                ${ig.telefono   ? `<div class="info-row"><span class="info-icon">📞</span><div><div class="info-label">Teléfono</div><div class="info-value"><a href="tel:${escHtml(ig.telefono)}">${escHtml(ig.telefono)}</a></div></div></div>` : ''}
                ${ig.emailContacto ? `<div class="info-row"><span class="info-icon">✉️</span><div><div class="info-label">Email</div><div class="info-value"><a href="mailto:${escHtml(ig.emailContacto)}">${escHtml(ig.emailContacto)}</a></div></div></div>` : ''}
                ${ig.horarios   ? `<div class="info-row"><span class="info-icon">🕐</span><div><div class="info-label">Horarios</div><div class="info-value">${escHtml(ig.horarios)}</div></div></div>` : ''}
                ${ig.descripcion? `<div class="info-row"><span class="info-icon">📝</span><div><div class="info-label">Descripción</div><div class="info-value">${escHtml(ig.descripcion)}</div></div></div>` : ''}
              </div>
              ${mapaHtml}
            </div>
          </div>
        </section>`;

      // ── OFRENDAS ──
      let ofrendarHtml = '';
      if (ig.ofrendas?.activo) {
        const of = ig.ofrendas;
        const metodos = [
          of.mercadopago ? '<span class="metodo-chip">💳 Mercado Pago</span>' : '',
          of.transferencia ? '<span class="metodo-chip">🏦 Transferencia</span>' : '',
          of.efectivo ? '<span class="metodo-chip">💵 Efectivo</span>' : '',
        ].filter(Boolean).join('');

        const detalle = [
          of.alias    ? `<div>📌 Alias: <strong>${escHtml(of.alias)}</strong></div>` : '',
          of.cbu      ? `<div>🏦 CBU: <strong>${escHtml(of.cbu)}</strong></div>` : '',
          of.titular  ? `<div>👤 Titular: <strong>${escHtml(of.titular)}</strong></div>` : '',
          of.mpLink   ? `<div>🔗 <a href="${escHtml(of.mpLink)}" target="_blank" rel="noopener">Pagar con Mercado Pago</a></div>` : '',
          of.mensaje  ? `<div style="margin-top:.5rem;font-style:italic;color:#666">"${escHtml(of.mensaje)}"</div>` : '',
        ].filter(Boolean).join('');

        ofrendarHtml = `
          <section class="section" style="padding-top:0">
            <div class="container">
              <h2 class="section-title">💝 Ofrendas y Diezmos</h2>
              <div class="ofrendas-box">
                <h3>Apoyá a ${escHtml(ig.nombre)}</h3>
                <p>${of.descripcion || 'Tu ofrenda ayuda a sostener el ministerio y bendecir a más personas.'}</p>
                <div class="ofrendas-metodos">${metodos}</div>
                ${detalle ? `<div class="ofrendas-detalle">${detalle}</div>` : ''}
              </div>
            </div>
          </section>`;
      }

      // ── EVENTOS ──
      const eventosItems = eventos.length ? eventos.map(ev => {
        const f = fmtFecha(ev.inicio);
        return `<div class="evento-card">
          <div class="evento-fecha"><div class="dia">${f.dia}</div><div class="mes">${f.mes}</div></div>
          <div class="evento-info">
            <h4>${escHtml(ev.titulo||'Evento')}</h4>
            ${ev.lugar ? `<div class="lugar">📍 ${escHtml(ev.lugar)}</div>` : ''}
            ${ev.descripcion ? `<div style="font-size:.82rem;color:#888;margin-top:.2rem">${escHtml(ev.descripcion)}</div>` : ''}
          </div>
        </div>`;
      }).join('') : `<div class="empty-state">📅 No hay eventos próximos por ahora.</div>`;

      const eventosHtml = `
        <section class="section" style="background:#fff;padding-top:2rem;padding-bottom:2rem">
          <div class="container">
            <h2 class="section-title">📅 Próximos Eventos</h2>
            <div class="eventos-list">${eventosItems}</div>
          </div>
        </section>`;

      // ── PRÉDICAS ──
      const predicasItems = predicas.length ? predicas.map(p => `
        <div class="predica-card">
          <iframe src="https://www.youtube.com/embed/${escHtml(p.youtubeId)}" allowfullscreen loading="lazy"></iframe>
          <div class="predica-body">
            <h4>${escHtml(p.titulo||'Prédica')}</h4>
            <div class="fecha">${fmtFecha(p.fecha).full}</div>
          </div>
        </div>`).join('') : `<div class="empty-state">🎙️ No hay prédicas publicadas aún.</div>`;

      const predicasHtml = `
        <section class="section">
          <div class="container">
            <h2 class="section-title">🎙️ Prédicas</h2>
            <div class="predicas-grid">${predicasItems}</div>
          </div>
        </section>`;

      // ── PETICIONES (formulario público) ──
      const peticionesHtml = `
        <section class="section" style="background:#fff;padding-top:2rem;padding-bottom:2rem">
          <div class="container">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem" class="forms-grid">

              <!-- PETICIÓN DE ORACIÓN -->
              <div class="form-box" id="formPeticion">
                <div class="form-icon">🙏</div>
                <h3 class="form-title">Petición de Oración</h3>
                <p class="form-desc">Enviá tu petición de forma privada. Solo el equipo pastoral la verá.</p>
                <div class="form-group">
                  <label class="form-label">Nombre <span style="color:var(--primary)">*</span></label>
                  <input id="pet_nombre" class="form-input" placeholder="Tu nombre">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.7rem">
                  <div class="form-group">
                    <label class="form-label">Apellido <span class="opt">opcional</span></label>
                    <input id="pet_apellido" class="form-input" placeholder="Tu apellido">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Teléfono <span class="opt">opcional</span></label>
                    <input id="pet_tel" class="form-input" placeholder="Ej: 261 555-1234" type="tel">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Tu petición <span style="color:var(--primary)">*</span></label>
                  <textarea id="pet_mensaje" class="form-input" rows="4" placeholder="Escribí tu petición de oración aquí…" style="resize:vertical"></textarea>
                </div>
                <button id="btnEnviarPeticion" class="form-btn">🙏 Enviar petición</button>
                <div id="petMsg" class="form-feedback"></div>
              </div>

              <!-- INSCRIPCIÓN AL BAUTISMO -->
              <div class="form-box" id="formBautismo">
                <div class="form-icon">💧</div>
                <h3 class="form-title">Inscripción al Bautismo</h3>
                <p class="form-desc">¿Sentís el llamado a bautizarte? Completá el formulario y nos ponemos en contacto.</p>
                <div class="form-group">
                  <label class="form-label">Nombre <span style="color:var(--primary)">*</span></label>
                  <input id="baut_nombre" class="form-input" placeholder="Tu nombre">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.7rem">
                  <div class="form-group">
                    <label class="form-label">Apellido <span class="opt">opcional</span></label>
                    <input id="baut_apellido" class="form-input" placeholder="Tu apellido">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Teléfono <span class="opt">opcional</span></label>
                    <input id="baut_tel" class="form-input" placeholder="Ej: 261 555-1234" type="tel">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">¿Querés contarnos algo? <span class="opt">opcional</span></label>
                  <textarea id="baut_mensaje" class="form-input" rows="3" placeholder="Contanos un poco sobre vos o tu historia de fe…" style="resize:vertical"></textarea>
                </div>
                <button id="btnEnviarBautismo" class="form-btn" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)">💧 Inscribirme al bautismo</button>
                <div id="bautMsg" class="form-feedback"></div>
              </div>

            </div>
          </div>
        </section>`;


      // ── GALERÍA ──
      let galeriaHtml = '';
      if (galeria.length) {
        const fotos = galeria.map(f => `
          <div style="border-radius:12px;overflow:hidden;aspect-ratio:1;background:#f0f0f0">
            <img src="${escHtml(f.url)}" alt="Foto de ${escHtml(ig.nombre)}" loading="lazy"
              style="width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in"
              onclick="abrirFoto('${escHtml(f.url)}')">
          </div>`).join('');
        galeriaHtml = `
          <section class="section">
            <div class="container">
              <h2 class="section-title">📷 Galería</h2>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem">
                ${fotos}
              </div>
            </div>
          </section>`;
      }

      // ── SITIO WEB ──
      const websiteHtml = ig.website ? `
        <div style="text-align:center;padding:.5rem 0 1.5rem">
          <a href="${escHtml(ig.website)}" target="_blank" rel="noopener"
            style="display:inline-flex;align-items:center;gap:.5rem;background:#f0f4ff;color:#3730a3;border:1px solid #c7d2fe;border-radius:10px;padding:.6rem 1.2rem;font-weight:700;text-decoration:none;font-size:.9rem">
            🌐 Visitar sitio web oficial
          </a>
        </div>` : '';

      app.innerHTML = heroHtml + websiteHtml + infoHtml + galeriaHtml + ofrendarHtml + eventosHtml + predicasHtml + peticionesHtml;

      // Inicializar estado del botón de notificaciones
      renderBtnNotif(estaSuscripto());
      // Activar formularios de petición y bautismo
      activarFormularios();
    }

    // ── FORMULARIOS: activar después de renderizar ──
    function activarFormularios() {
      // PETICIÓN
      document.getElementById('btnEnviarPeticion')?.addEventListener('click', async () => {
        const nombre  = (document.getElementById('pet_nombre')?.value||'').trim();
        const apellido= (document.getElementById('pet_apellido')?.value||'').trim();
        const tel     = (document.getElementById('pet_tel')?.value||'').trim();
        const mensaje = (document.getElementById('pet_mensaje')?.value||'').trim();
        const msgEl   = document.getElementById('petMsg');
        const btn     = document.getElementById('btnEnviarPeticion');

        if (!nombre || !mensaje) {
          msgEl.textContent = '❌ Completá tu nombre y tu petición.';
          msgEl.style.color = '#dc3545';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Enviando…';
        try {
          const { addDoc, collection, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
          await addDoc(collection(db, 'iglesias', iglesiaId, 'peticiones'), {
            nombre, apellido, tel, mensaje,
            leida: false,
            creadoEn: serverTimestamp()
          });
          msgEl.textContent = '✅ ¡Petición enviada! El equipo pastoral la recibirá con amor.';
          msgEl.style.color = '#16a34a';
          document.getElementById('pet_nombre').value = '';
          document.getElementById('pet_apellido').value = '';
          document.getElementById('pet_tel').value = '';
          document.getElementById('pet_mensaje').value = '';
          btn.textContent = '🙏 Petición enviada';
        } catch(e) {
          msgEl.textContent = '❌ Error: ' + e.message;
          msgEl.style.color = '#dc3545';
          btn.disabled = false;
          btn.textContent = '🙏 Enviar petición';
        }
      });

      // BAUTISMO
      document.getElementById('btnEnviarBautismo')?.addEventListener('click', async () => {
        const nombre  = (document.getElementById('baut_nombre')?.value||'').trim();
        const apellido= (document.getElementById('baut_apellido')?.value||'').trim();
        const tel     = (document.getElementById('baut_tel')?.value||'').trim();
        const mensaje = (document.getElementById('baut_mensaje')?.value||'').trim();
        const msgEl   = document.getElementById('bautMsg');
        const btn     = document.getElementById('btnEnviarBautismo');

        if (!nombre) {
          msgEl.textContent = '❌ Ingresá tu nombre.';
          msgEl.style.color = '#dc3545';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Enviando…';
        try {
          const { addDoc, collection, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
          await addDoc(collection(db, 'iglesias', iglesiaId, 'bautismos'), {
            nombre, apellido, tel, mensaje,
            leido: false,
            creadoEn: serverTimestamp()
          });
          msgEl.textContent = '✅ ¡Inscripción enviada! El equipo se pondrá en contacto con vos.';
          msgEl.style.color = '#1d4ed8';
          document.getElementById('baut_nombre').value = '';
          document.getElementById('baut_apellido').value = '';
          document.getElementById('baut_tel').value = '';
          document.getElementById('baut_mensaje').value = '';
          btn.textContent = '💧 Inscripción enviada';
        } catch(e) {
          msgEl.textContent = '❌ Error: ' + e.message;
          msgEl.style.color = '#dc3545';
          btn.disabled = false;
          btn.textContent = '💧 Inscribirme al bautismo';
        }
      });
    }

    window.compartir = function() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: document.title, url });
      } else {
        navigator.clipboard.writeText(url).then(()=> alert('¡Enlace copiado al portapapeles!'));
      }
    };

    window.abrirFoto = function(url) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      img.src = url;
      lb.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    document.getElementById('lightbox')?.addEventListener('click', () => {
      document.getElementById('lightbox').style.display = 'none';
      document.body.style.overflow = '';
    });

    render().catch(e => {
      document.getElementById('app').innerHTML = `<div style="text-align:center;padding:4rem;color:#888"><h2>Error al cargar</h2><p>${e.message}</p></div>`;
    });
  </script>

  <!-- Lightbox -->
  <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;padding:1rem">
    <img id="lightboxImg" src="" alt="" style="max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain;box-shadow:0 8px 40px rgba(0,0,0,.5)">
  </div>

  <!-- SW para notificaciones en background -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
